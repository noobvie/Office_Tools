<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Office Tools</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .auth-wrap {
      min-height: calc(100vh - 56px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .auth-card {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.25rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,.1);
    }
    .auth-logo  { text-align: center; font-size: 2rem; margin-bottom: .5rem; }
    .auth-title { text-align: center; font-size: 1.4rem; font-weight: 900; margin-bottom: .25rem; }
    .auth-sub   { text-align: center; font-size: .85rem; color: var(--text-muted); margin-bottom: 1.75rem; }
    .auth-footer { text-align: center; margin-top: 1.25rem; font-size: .83rem; color: var(--text-muted); }
    .auth-footer a { color: var(--primary); text-decoration: none; font-weight: 700; }
    .perks { display: flex; flex-direction: column; gap: .4rem; margin-bottom: 1.5rem; }
    .perk  { display: flex; align-items: center; gap: .5rem; font-size: .83rem; color: var(--text-muted); }
    .perk .icon { color: var(--primary); }
    #errorMsg { display: none; }
    .pw-strength { height: 4px; border-radius: 2px; margin-top: .35rem; background: var(--border); overflow: hidden; }
    .pw-strength-fill { height: 100%; border-radius: 2px; transition: width .3s, background .3s; }
  </style>
</head>
<body>

<header class="site-header">
  <a href="../index.html" class="header-logo"><span class="logo-icon">🛠️</span> Office Tools</a>
  <div class="header-actions">
    <div id="authNav" style="display:flex;gap:.5rem;align-items:center"></div>
    <button class="theme-toggle" id="themeToggle"></button>
  </div>
</header>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">🛠️</div>
    <div class="auth-title">Create free account</div>
    <div class="auth-sub">No credit card. No tracking. Just tools.</div>

    <div class="perks">
      <div class="perk"><span class="icon">✓</span> Unlimited access to all 28 free tools</div>
      <div class="perk"><span class="icon">✓</span> Usage history &amp; dashboard</div>
      <div class="perk"><span class="icon">✓</span> Priority access to new tools</div>
      <div class="perk"><span class="icon">🔒</span> Optional Pro upgrade via Grin coin</div>
    </div>

    <div id="errorMsg" class="alert alert-danger"></div>

    <form id="registerForm">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="nameInput" placeholder="Your name" autocomplete="name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="emailInput" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="passwordInput" placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password">
        <div class="pw-strength"><div class="pw-strength-fill" id="pwFill" style="width:0%"></div></div>
        <div style="font-size:.7rem;color:var(--text-muted);margin-top:.2rem" id="pwHint"></div>
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn" style="width:100%;margin-top:.5rem">
        Create Free Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/common.js"></script>
<script src="../js/auth.js"></script>
<script>
  if (OTAuth.isLoggedIn()) window.location.href = 'dashboard.html';

  const pwInput  = document.getElementById('passwordInput');
  const pwFill   = document.getElementById('pwFill');
  const pwHint   = document.getElementById('pwHint');
  const errorMsg = document.getElementById('errorMsg');
  const submitBtn = document.getElementById('submitBtn');

  pwInput.addEventListener('input', () => {
    const v = pwInput.value;
    let score = 0;
    if (v.length >= 8)  score++;
    if (v.length >= 12) score++;
    if (/[A-Z]/.test(v)) score++;
    if (/[0-9]/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;
    const colors = ['#ef4444','#f97316','#eab308','#22c55e','#16a34a'];
    const labels = ['Very weak','Weak','Fair','Strong','Very strong'];
    pwFill.style.width   = (score / 5 * 100) + '%';
    pwFill.style.background = colors[score-1] || '#94a3b8';
    pwHint.textContent   = score > 0 ? labels[score-1] : '';
  });

  document.getElementById('registerForm').addEventListener('submit', async e => {
    e.preventDefault();
    errorMsg.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating account…';
    try {
      await OTAuth.register(
        document.getElementById('emailInput').value.trim(),
        document.getElementById('passwordInput').value,
        document.getElementById('nameInput').value.trim(),
      );
      window.location.href = 'dashboard.html?welcome=1';
    } catch(err) {
      errorMsg.textContent = err.message || 'Registration failed. Try a different email.';
      errorMsg.style.display = '';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Create Free Account';
    }
  });
</script>
</body>
</html>
