<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Office Tools</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .dash-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: .75rem; margin-top: .75rem; }
    .stat-card  { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: .85rem 1rem; }
    .stat-card .sv { font-size: 1.8rem; font-weight: 900; color: var(--primary); }
    .stat-card .sl { font-size: .72rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: .05em; margin-top: .15rem; }

    .plan-badge {
      display: inline-block;
      padding: .3rem 1rem;
      border-radius: 50px;
      font-weight: 800;
      font-size: .85rem;
    }
    .plan-free { background: var(--bg-secondary); color: var(--text-muted); border: 1.5px solid var(--border); }
    .plan-pro  { background: var(--primary-dim); color: var(--primary); border: 1.5px solid var(--primary); }

    .usage-bar-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .55rem; font-size: .83rem; }
    .usage-bar-wrap { flex: 1; background: var(--border); border-radius: 4px; height: 8px; overflow: hidden; }
    .usage-bar-fill { height: 100%; border-radius: 4px; background: var(--primary); transition: width .4s; }
    .usage-tool-name { min-width: 140px; color: var(--text-muted); }
    .usage-count { min-width: 36px; text-align: right; font-weight: 700; color: var(--primary); font-family: monospace; }

    .form-inline { display: flex; gap: .5rem; align-items: flex-end; flex-wrap: wrap; }
    .form-inline .form-group { flex: 1; min-width: 160px; margin-bottom: 0; }

    #welcomeBanner { display: none; }
  </style>
</head>
<body>

<header class="site-header">
  <a href="../index.html" class="header-logo"><span class="logo-icon">🛠️</span> Office Tools</a>
  <span class="header-tool-name">Dashboard</span>
  <div class="header-actions">
    <div id="authNav" style="display:flex;gap:.5rem;align-items:center"></div>
    <button class="theme-toggle" id="themeToggle"></button>
  </div>
</header>

<main class="tool-main">
  <div class="tool-header">
    <h1 id="greeting">👤 My Dashboard</h1>
    <p id="subStatus">Loading…</p>
  </div>

  <!-- Welcome banner (shown on first login) -->
  <div id="welcomeBanner" class="alert" style="background:var(--primary-dim);border:1.5px solid var(--primary);color:var(--primary);margin-bottom:1rem">
    🎉 Welcome to Office Tools! Your account is ready.
  </div>

  <!-- Plan card -->
  <div class="card" id="planCard">
    <div class="flex-between" style="flex-wrap:wrap;gap:.75rem">
      <div>
        <strong>Current Plan</strong>
        <div style="margin-top:.4rem" id="planBadgeWrap"></div>
        <div style="font-size:.8rem;color:var(--text-muted);margin-top:.35rem" id="subExpiry"></div>
      </div>
      <div id="planActions"></div>
    </div>
  </div>

  <!-- Usage stats -->
  <div class="card mt-2">
    <strong>Tool Usage — Today</strong>
    <div class="dash-grid mt-2" id="statsGrid">
      <div class="stat-card"><div class="sv" id="totalToday">—</div><div class="sl">Uses Today</div></div>
      <div class="stat-card"><div class="sv" id="totalTools">—</div><div class="sl">Tools Used</div></div>
      <div class="stat-card"><div class="sv" id="streakDays">—</div><div class="sl">Day Streak</div></div>
      <div class="stat-card"><div class="sv" id="memberSince">—</div><div class="sl">Member Since</div></div>
    </div>
    <div id="usageBars" style="margin-top:1rem"></div>
  </div>

  <!-- Account settings -->
  <div class="card mt-2">
    <strong>Account Settings</strong>
    <form id="profileForm" style="margin-top:.75rem">
      <div class="form-inline">
        <div class="form-group">
          <label>Display Name</label>
          <input type="text" id="nameInput" placeholder="Your name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="emailInput" readonly style="background:var(--bg-secondary);cursor:not-allowed">
        </div>
        <button type="submit" class="btn btn-secondary btn-sm" id="saveProfileBtn">Save</button>
      </div>
      <div id="profileMsg" style="font-size:.8rem;margin-top:.4rem;display:none"></div>
    </form>
  </div>

  <!-- Change password -->
  <div class="card mt-2">
    <strong>Change Password</strong>
    <form id="pwForm" style="margin-top:.75rem">
      <div class="form-inline">
        <div class="form-group">
          <label>Current Password</label>
          <input type="password" id="oldPw" placeholder="••••••••">
        </div>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="newPw" placeholder="Min. 8 characters" minlength="8">
        </div>
        <button type="submit" class="btn btn-secondary btn-sm">Update</button>
      </div>
      <div id="pwMsg" style="font-size:.8rem;margin-top:.4rem;display:none"></div>
    </form>
  </div>

  <!-- Danger zone -->
  <div class="card mt-2" style="border-color:rgba(239,68,68,.3)">
    <strong style="color:#dc2626">Danger Zone</strong>
    <div style="margin-top:.75rem;display:flex;gap:.75rem;flex-wrap:wrap;align-items:center">
      <button class="btn btn-ghost btn-sm" id="signOutBtn" style="color:#dc2626;border-color:rgba(239,68,68,.3)">Sign Out of All Devices</button>
    </div>
  </div>
</main>

<script src="../js/config.js"></script>
<script src="../js/common.js"></script>
<script src="../js/auth.js"></script>
<script>
  if (!OTAuth.isLoggedIn()) {
    window.location.href = 'login.html?next=' + encodeURIComponent(window.location.href);
  }

  // Welcome banner
  if (new URLSearchParams(window.location.search).get('welcome')) {
    document.getElementById('welcomeBanner').style.display = '';
    history.replaceState({}, '', 'dashboard.html');
  }

  function init() {
    const user = OTAuth.getUser();
    const sub  = OTAuth.getSub();
    const name = OTAuth.getDisplayName();

    document.getElementById('greeting').textContent = `👤 Welcome, ${name}`;
    document.getElementById('nameInput').value  = user.name || '';
    document.getElementById('emailInput').value = user.email;
    document.getElementById('memberSince').textContent = new Date(user.created).toLocaleDateString('en', {month:'short', year:'numeric'});

    // Plan badge
    const planWrap = document.getElementById('planBadgeWrap');
    const plan = OTAuth.getPlanLabel();
    planWrap.innerHTML = `<span class="plan-badge ${OTAuth.isPro() ? 'plan-pro' : 'plan-free'}">${plan}</span>`;

    // Subscription expiry
    if (sub && sub.expires_at) {
      const exp = new Date(sub.expires_at);
      const days = Math.ceil((exp - new Date()) / 86400000);
      document.getElementById('subExpiry').textContent = days > 0
        ? `Expires in ${days} day${days !== 1 ? 's' : ''} · ${exp.toLocaleDateString()}`
        : 'Subscription expired';
    } else if (sub && sub.plan === 'lifetime') {
      document.getElementById('subExpiry').textContent = 'Lifetime — never expires';
    }

    // Plan actions
    const actionsEl = document.getElementById('planActions');
    if (OTAuth.isPro()) {
      actionsEl.innerHTML = `<a href="upgrade.html" class="btn btn-secondary btn-sm" style="text-decoration:none">Manage Subscription</a>`;
    } else {
      actionsEl.innerHTML = `<a href="upgrade.html" class="btn btn-primary btn-sm" style="text-decoration:none">🚀 Upgrade to Pro</a>`;
    }

    // Sub status text
    document.getElementById('subStatus').textContent = OTAuth.isPro()
      ? 'Pro member — enjoy unlimited access to all tools.'
      : 'Free account — all 28 tools available, unlimited use.';

    // Usage bars from localStorage
    const map = JSON.parse(localStorage.getItem('ot_usage') || '{}');
    const today = (() => { const d = new Date(); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; })();
    const todayEntries = Object.entries(map).filter(([k]) => k.endsWith('_'+today));
    const toolUsage = {};
    let totalToday = 0;
    todayEntries.forEach(([k, v]) => {
      const tool = k.replace('_'+today,'');
      toolUsage[tool] = v;
      totalToday += v;
    });
    document.getElementById('totalToday').textContent = totalToday;
    document.getElementById('totalTools').textContent = Object.keys(toolUsage).length;

    // Streak: count distinct days
    const days = new Set(Object.keys(map).map(k => k.split('_').pop()));
    document.getElementById('streakDays').textContent = days.size;

    const sorted = Object.entries(toolUsage).sort((a,b) => b[1]-a[1]).slice(0,8);
    const max = sorted[0]?.[1] || 1;
    const barsEl = document.getElementById('usageBars');
    if (sorted.length === 0) {
      barsEl.innerHTML = '<span style="color:var(--text-muted);font-size:.85rem">No tool usage recorded today.</span>';
    } else {
      barsEl.innerHTML = sorted.map(([tool, count]) => `
        <div class="usage-bar-row">
          <span class="usage-tool-name">${escHtml(tool)}</span>
          <div class="usage-bar-wrap"><div class="usage-bar-fill" style="width:${Math.round(count/max*100)}%"></div></div>
          <span class="usage-count">${count}</span>
        </div>`).join('');
    }
  }

  init();

  // Profile form
  document.getElementById('profileForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('saveProfileBtn');
    const msg = document.getElementById('profileMsg');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      await OTAuth.updateProfile({ name: document.getElementById('nameInput').value.trim() });
      msg.textContent = '✓ Profile updated.'; msg.style.color = 'var(--primary)'; msg.style.display = '';
    } catch(err) {
      msg.textContent = err.message; msg.style.color = '#dc2626'; msg.style.display = '';
    }
    btn.disabled = false; btn.textContent = 'Save';
    setTimeout(() => msg.style.display = 'none', 3000);
  });

  // Password form
  document.getElementById('pwForm').addEventListener('submit', async e => {
    e.preventDefault();
    const msg = document.getElementById('pwMsg');
    try {
      await OTAuth.changePassword(
        document.getElementById('oldPw').value,
        document.getElementById('newPw').value,
      );
      msg.textContent = '✓ Password updated. Please log in again.'; msg.style.color = 'var(--primary)'; msg.style.display = '';
      setTimeout(() => { OTAuth.logout(); }, 2000);
    } catch(err) {
      msg.textContent = err.message; msg.style.color = '#dc2626'; msg.style.display = '';
    }
  });

  document.getElementById('signOutBtn').addEventListener('click', () => {
    if (confirm('Sign out of all sessions?')) OTAuth.logout();
  });
</script>
</body>
</html>
