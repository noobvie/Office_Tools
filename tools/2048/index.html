<script src="../../js/common.js"></script>
<script>
initThemeToggle('themeToggle');

const BEST_KEY = 'ot-2048-best';
let board, score, prev, won, over;

function newGame() {
  board = Array.from({length:4}, () => Array(4).fill(0));
  score = 0;
  prev  = null;
  won   = false;
  over  = false;
  addTile(); addTile();
  render();
  hideOverlay();
}

function addTile() {
  const empty = [];
  for (let r=0;r<4;r++) for (let c=0;c<4;c++) if (!board[r][c]) empty.push([r,c]);
  if (!empty.length) return false;
  const [r,c] = empty[Math.floor(Math.random()*empty.length)];
  board[r][c] = Math.random()<0.9 ? 2 : 4;
  return true;
}

function cloneBoard() { return board.map(r=>[...r]); }

function move(dir) {
  if (over) return;
  const old = cloneBoard();
  const oldScore = score;
  let moved = false;

  const merge = row => {
    let arr = row.filter(x=>x);
    for (let i=0;i<arr.length-1;i++) {
      if (arr[i]===arr[i+1]) { arr[i]*=2; score+=arr[i]; arr.splice(i+1,1); moved=true; }
    }
    while (arr.length<4) arr.push(0);
    return arr;
  };

  if (dir==='left')  for (let r=0;r<4;r++) { const n=merge(board[r]); if(n.join()!==board[r].join()) moved=true; board[r]=n; }
  if (dir==='right') for (let r=0;r<4;r++) { const n=merge([...board[r]].reverse()).reverse(); if(n.join()!==board[r].join()) moved=true; board[r]=n; }
  if (dir==='up')    for (let c=0;c<4;c++) { const col=board.map(r=>r[c]); const n=merge(col); n.forEach((v,r)=>board[r][c]=v); if(n.join()!==col.join()) moved=true; }
  if (dir==='down')  for (let c=0;c<4;c++) { const col=board.map(r=>r[c]); const n=merge([...col].reverse()).reverse(); n.forEach((v,r)=>board[r][c]=v); if(n.join()!==col.join()) moved=true; }

  if (moved) {
    prev = { board: old, score: oldScore };
    addTile();
    updateBest();
    render();
    checkState();
  }
}

function checkState() {
  const flat = board.flat();
  if (!won && flat.includes(2048)) {
    won = true;
    showOverlay('🎉 You Win!', 'You reached 2048!', true);
    return;
  }
  if (!flat.includes(0)) {
    for (let r=0;r<4;r++) for (let c=0;c<4;c++) {
      if ((c<3 && board[r][c]===board[r][c+1]) || (r<3 && board[r][c]===board[r+1][c])) return;
    }
    over = true;
    showOverlay('😔 Game Over', `Score: ${score}`, false);
  }
}

function updateBest() {
  const b = parseInt(localStorage.getItem(BEST_KEY)||0);
  if (score>b) localStorage.setItem(BEST_KEY, score);
  document.getElementById('best').textContent = Math.max(score, b);
}

function render() {
  const el = document.getElementById('board');
  el.innerHTML = '';
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = Math.max(score, parseInt(localStorage.getItem(BEST_KEY)||0));
  board.flat().forEach(v => {
    const c = document.createElement('div');
    c.className = 'cell' + (v ? ' t'+tileClass(v) : '');
    if (v) c.textContent = v;
    el.appendChild(c);
  });
}

function tileClass(v) {
  if (v<=2048) return v;
  return 'big';
}

function showOverlay(title, msg, canContinue) {
  document.getElementById('overlayTitle').textContent = title;
  document.getElementById('overlayMsg').textContent   = msg;
  document.getElementById('continueBtn').style.display = canContinue ? '' : 'none';
  document.getElementById('overlay').classList.add('show');
}
function hideOverlay() { document.getElementById('overlay').classList.remove('show'); }

// Controls
document.addEventListener('keydown', e => {
  const map = { ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down' };
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
});

let tx=0, ty=0;
document.getElementById('board').addEventListener('touchstart', e=>{ tx=e.touches[0].clientX; ty=e.touches[0].clientY; }, {passive:true});
document.getElementById('board').addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if (Math.max(Math.abs(dx),Math.abs(dy))<30) return;
  if (Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
});

document.getElementById('newBtn').addEventListener('click', newGame);
document.getElementById('overlayNewBtn').addEventListener('click', newGame);
document.getElementById('continueBtn').addEventListener('click', ()=>{ hideOverlay(); });
document.getElementById('undoBtn').addEventListener('click', ()=>{
  if (!prev) return;
  board=prev.board; score=prev.score; prev=null; over=false;
  render();
});

newGame();
</script>
