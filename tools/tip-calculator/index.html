  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .input-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .75rem; }
    .quick-tips { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: .5rem; }
    .tip-btn { padding: .45rem .85rem; border: 1.5px solid var(--border); border-radius: 2rem;
      background: none; cursor: pointer; font-size: .88rem; font-weight: 700;
      color: var(--text); transition: all var(--transition); }
    .tip-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-top: .75rem; }
    .res-stat { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: .85rem 1rem; }
    .res-label { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); }
    .res-val { font-size: 1.75rem; font-weight: 800; color: var(--primary); margin-top: .15rem; }
    .res-val.big { font-size: 2.2rem; }
    .round-toggle { display: flex; align-items: center; gap: .5rem; font-size: .85rem; cursor: pointer; }
    @media (max-width: 480px) { .input-grid { grid-template-columns: 1fr; } .result-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header class="site-header">
  <a href="../../index.html" class="header-logo"><span class="logo-icon">🛠️</span> Office Tools</a>
  <span class="header-tool-name">Tip Calculator</span>
  <div class="header-actions">
    <button class="theme-toggle" id="themeToggle"></button>
  </div>
</header>

<main class="tool-main">
  <div class="tool-header">
    <h1>🧾 Tip Calculator</h1>
    <p>Calculate tip, total, and per-person amount. Quick tip buttons for common percentages.</p>
  </div>

  <div class="card">
    <div class="input-grid">
      <div>
        <label class="form-label">Bill Amount ($)</label>
        <input type="number" id="tcBill" class="form-input" min="0" step="0.01" value="85.00" placeholder="0.00">
      </div>
      <div>
        <label class="form-label">Tip %</label>
        <input type="number" id="tcTip" class="form-input" min="0" step="0.5" value="18" placeholder="18">
      </div>
      <div>
        <label class="form-label">Number of People</label>
        <input type="number" id="tcPeople" class="form-input" min="1" step="1" value="2">
      </div>
    </div>
    <div>
      <div style="font-size:.78rem;color:var(--text-muted);margin-top:.75rem;margin-bottom:.3rem;font-weight:600">Quick Tip</div>
      <div class="quick-tips" id="quickTips">
        <button class="tip-btn" data-tip="10">10%</button>
        <button class="tip-btn" data-tip="15">15%</button>
        <button class="tip-btn active" data-tip="18">18%</button>
        <button class="tip-btn" data-tip="20">20%</button>
        <button class="tip-btn" data-tip="25">25%</button>
      </div>
    </div>
    <div class="mt-2">
      <label class="round-toggle">
        <input type="checkbox" id="tcRound"> Round up total per person to nearest dollar
      </label>
    </div>
  </div>

  <div class="card mt-2">
    <div class="result-grid">
      <div class="res-stat" style="grid-column:1/-1">
        <div class="res-label">Total Per Person</div>
        <div class="res-val big" id="rPerPersonTotal">$0.00</div>
      </div>
      <div class="res-stat">
        <div class="res-label">Tip Amount</div>
        <div class="res-val" id="rTipAmt">$0.00</div>
      </div>
      <div class="res-stat">
        <div class="res-label">Total Bill</div>
        <div class="res-val" id="rTotal">$0.00</div>
      </div>
      <div class="res-stat">
        <div class="res-label">Tip Per Person</div>
        <div class="res-val" id="rTipPP">$0.00</div>
      </div>
      <div class="res-stat">
        <div class="res-label">Bill Per Person</div>
        <div class="res-val" id="rBillPP">$0.00</div>
      </div>
    </div>
  </div>
</main>

<script src="../../js/config.js"></script>
<script src="../../js/common.js"></script>
<script>
function fmtUSD(n) { return '$' + n.toFixed(2); }

function compute() {
  const bill   = parseFloat(document.getElementById('tcBill').value)   || 0;
  const tipPct = parseFloat(document.getElementById('tcTip').value)    || 0;
  const people = Math.max(1, parseInt(document.getElementById('tcPeople').value) || 1);
  const round  = document.getElementById('tcRound').checked;

  const tipAmt   = bill * tipPct / 100;
  const total    = bill + tipAmt;
  const billPP   = bill / people;
  const tipPP    = tipAmt / people;
  let   totalPP  = total / people;
  if (round) totalPP = Math.ceil(totalPP);

  document.getElementById('rTipAmt').textContent      = fmtUSD(tipAmt);
  document.getElementById('rTotal').textContent        = fmtUSD(total);
  document.getElementById('rBillPP').textContent       = fmtUSD(billPP);
  document.getElementById('rTipPP').textContent        = fmtUSD(tipPP);
  document.getElementById('rPerPersonTotal').textContent = fmtUSD(totalPP);
}

document.querySelectorAll('.tip-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tip-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tcTip').value = btn.dataset.tip;
    compute();
  });
});

document.getElementById('tcTip').addEventListener('input', () => {
  const val = parseFloat(document.getElementById('tcTip').value);
  document.querySelectorAll('.tip-btn').forEach(b => {
    b.classList.toggle('active', parseFloat(b.dataset.tip) === val);
  });
});

['tcBill','tcTip','tcPeople','tcRound'].forEach(id => {
  document.getElementById(id).addEventListener('input', compute);
  document.getElementById(id).addEventListener('change', compute);
});

compute();
</script>
</body>
</html>
