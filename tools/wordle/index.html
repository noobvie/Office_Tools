  <style>
    .game-wrap { display:flex; flex-direction:column; align-items:center; gap:.9rem; }
    .wordle-grid { display:grid; grid-template-rows:repeat(6,1fr); gap:5px; }
    .w-row { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; }
    .w-tile {
      width:58px; height:58px; border:2px solid var(--border); border-radius:4px;
      display:flex; align-items:center; justify-content:center;
      font-size:1.6rem; font-weight:800; text-transform:uppercase;
      transition:background .2s, border-color .2s, transform .1s;
      background:var(--bg-card); color:var(--text);
    }
    .w-tile.filled { border-color:var(--text-muted); transform:scale(1.05); }
    .w-tile.correct { background:#00e676; border-color:#00e676; color:#000; }
    .w-tile.present { background:#ff9800; border-color:#ff9800; color:#000; }
    .w-tile.absent  { background:#1a1a1a; border-color:#1a1a1a; color:#555; }
    .w-row.shake { animation:shake .4s; }
    @keyframes shake { 0%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} 100%{transform:translateX(0)} }
    @media(max-width:360px){.w-tile{width:48px;height:48px;font-size:1.3rem;}}
    .keyboard { display:flex; flex-direction:column; gap:5px; align-items:center; }
    .kb-row { display:flex; gap:4px; }
    .kb-key {
      height:56px; min-width:36px; padding:0 6px;
      border:none; border-radius:4px; font-size:.9rem; font-weight:700;
      cursor:pointer; background:#818384; color:#fff;
      display:flex; align-items:center; justify-content:center;
      user-select:none; transition:background .15s;
    }
    .kb-key.wide { min-width:56px; font-size:.75rem; }
    .kb-key.correct { background:#00e676!important; color:#000; }
    .kb-key.present { background:#ff9800!important; color:#000; }
    .kb-key.absent  { background:#1a1a1a!important; color:#555; }
    .toast {
      position:fixed; top:70px; left:50%; transform:translateX(-50%);
      background:var(--text); color:var(--bg-card); padding:.5rem 1.2rem;
      border-radius:6px; font-weight:700; z-index:200;
      opacity:0; transition:opacity .2s; pointer-events:none;
    }
    .toast.show { opacity:1; }
    .mode-select { display:flex; gap:.4rem; }
    .mode-btn { padding:.3rem .75rem; border:1.5px solid var(--border); border-radius:var(--radius); cursor:pointer; font-size:.82rem; background:var(--bg-card); }
    .mode-btn.active { border-color:var(--primary); color:var(--primary); font-weight:600; }
    .stats-bar { display:flex; gap:.6rem; flex-wrap:wrap; justify-content:center; }
    .stat-box { background:var(--bg); border:1.5px solid var(--border); border-radius:var(--radius); padding:.3rem .65rem; text-align:center; min-width:60px; }
    .stat-box small { display:block; font-size:.65rem; color:var(--text-muted); text-transform:uppercase; }
    .stat-box span { display:block; font-size:1rem; font-weight:700; }

<body>

<header class="site-header">

<main class="tool-main">

    <h1>💬 Wordle</h1>

  </div>

  <div class="game-wrap">

      <div class="mode-select">

      <div class="stat-box"><small>Streak</small><span id="sStreak">0</span></div>

    <div class="wordle-grid" id="wordleGrid"></div>
    <div class="keyboard" id="keyboard"></div>
  </div>
</main>

<script src="../../js/common.js"></script>
<script>
initThemeToggle('themeToggle');

// ── Word List (1000 common 5-letter words) ──

dy wired witty woken woken woman women world wrath write wrote yacht yearn yodel young yours zappy zebra zesty zilch zipper zombie'.split(' ').filter(w=>w.length===5&&/^[a-z]+$/.test(w));

// Deduplicate
const WORDSET = [...new Set(WORDS)];
const WORD_IDX_BASE = new Date('2024-01-01').getTime();

function getDailyWord() {
  const dayIdx = Math.floor((Date.now() - WORD_IDX_BASE) / 86400000);
  return WORDSET[dayIdx % WORDSET.length];
}
function getRandWord() { return WORDSET[Math.floor(Math.random()*WORDSET.length)]; }

// ── Stats ──
const SK = 'ot-wordle-';
function getStats() {
  return {
    played: parseInt(localStorage.getItem(SK+'played')||0),
    wins:   parseInt(localStorage.getItem(SK+'wins')||0),
    streak: parseInt(localStorage.getItem(SK+'streak')||0),
    best:   parseInt(localStorage.getItem(SK+'best')||0),
  };
}
function saveStats(s) {
  localStorage.setItem(SK+'played',s.played);
  localStorage.setItem(SK+'wins',s.wins);
  localStorage.setItem(SK+'streak',s.streak);
  localStorage.setItem(SK+'best',s.best);
}
function renderStats() {
  const s=getStats();
  document.getElementById('sPlayed').textContent=s.played;
  document.getElementById('sWin').textContent=s.played?Math.round(s.wins/s.played*100)+'%':'0%';
  document.getElementById('sStreak').textContent=s.streak;
  document.getElementById('sBest').textContent=s.best;
}

// ── Game state ──
let target='', guesses=[], current='', done=false, daily=true;
const KB_ROWS=[['q','w','e','r','t','y','u','i','o','p'],['a','s','d','f','g','h','j','k','l'],['Enter','z','x','c','v','b','n','m','⌫']];

function buildGrid() {
  const g=document.getElementById('wordleGrid');
  g.innerHTML='';
  for(let r=0;r<6;r++){
    const row=document.createElement('div');
    row.className='w-row'; row.id='row-'+r;
    for(let c=0;c<5;c++){
      const t=document.createElement('div');
      t.className='w-tile'; t.id=`t${r}${c}`;
      row.appendChild(t);
    }
    g.appendChild(row);
  }
}

function buildKeyboard() {
  const kb=document.getElementById('keyboard');
  kb.innerHTML='';
  KB_ROWS.forEach(row=>{
    const r=document.createElement('div'); r.className='kb-row';
    row.forEach(k=>{
      const b=document.createElement('button');
      b.className='kb-key'+(k==='Enter'||k==='⌫'?' wide':'');
      b.textContent=k; b.dataset.key=k;
      b.addEventListener('click',()=>handleKey(k==='⌫'?'Backspace':k));
      r.appendChild(b);
    });
    kb.appendChild(r);
  });
}

function renderCurrentRow() {
  const r=guesses.length;
  if(r>=6)return;
  for(let c=0;c<5;c++){
    const t=document.getElementById(`t${r}${c}`);
    if(current[c]){t.textContent=current[c].toUpperCase();t.classList.add('filled');}
    else{t.textContent='';t.classList.remove('filled');}
  }
}

function submitGuess() {
  if(current.length!==5){toast('Not enough letters');shakeRow(guesses.length);return;}
  if(!WORDSET.includes(current)){toast('Not in word list');shakeRow(guesses.length);return;}

  const result=evaluate(current,target);
  const rowIdx=guesses.length;
  for(let c=0;c<5;c++){
    const t=document.getElementById(`t${rowIdx}${c}`);
    t.textContent=current[c].toUpperCase();
    t.className='w-tile '+result[c];
    updateKey(current[c],result[c]);
  }
  guesses.push(current);
  current='';

  if(result.every(r=>r==='correct')){
    done=true;
    const st=getStats();
    st.played++; st.wins++; st.streak++; st.best=Math.max(st.best,st.streak);
    saveStats(st); renderStats();
    toast(['Genius!','Magnificent!','Impressive!','Splendid!','Great!','Phew!'][guesses.length-1]||'Nice!');
    document.getElementById('shareBtn').style.display='';
    if(!daily) document.getElementById('newBtn').style.display='';
    return;
  }
  if(guesses.length===6){
    done=true;
    const st=getStats();
    st.played++; st.streak=0;
    saveStats(st); renderStats();
    toast(target.toUpperCase(), 4000);
    if(!daily) document.getElementById('newBtn').style.display='';
  }
}

function evaluate(guess,answer){
  const res=Array(5).fill('absent');
  const ansArr=[...answer], remaining=[...answer];
  // First pass: correct
  for(let i=0;i<5;i++) if(guess[i]===answer[i]){res[i]='correct';remaining[remaining.indexOf(guess[i])]='_';}
  // Second pass: present
  for(let i=0;i<5;i++){
    if(res[i]==='correct')continue;
    const idx=remaining.indexOf(guess[i]);
    if(idx>=0){res[i]='present';remaining[idx]='_';}
  }
  return res;
}

function updateKey(letter,state) {
  const btn=document.querySelector(`.kb-key[data-key="${letter}"]`);
  if(!btn)return;
  const priority={correct:3,present:2,absent:1};
  const cur=btn.classList.contains('correct')?3:btn.classList.contains('present')?2:btn.classList.contains('absent')?1:0;
  if((priority[state]||0)>cur){btn.classList.remove('correct','present','absent');btn.classList.add(state);}
}

function handleKey(key) {
  if(done)return;
  if(key==='Enter'){submitGuess();return;}
  if(key==='Backspace'){current=current.slice(0,-1);renderCurrentRow();return;}
  if(/^[a-zA-Z]$/.test(key)&&current.length<5){current+=key.toLowerCase();renderCurrentRow();}
}

document.addEventListener('keydown',e=>handleKey(e.key));

function shakeRow(r){
  const row=document.getElementById('row-'+r);
  row.classList.add('shake');
  setTimeout(()=>row.classList.remove('shake'),400);
}

let toastTimer;
function toast(msg,dur=1800){
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),dur);
}

function getEmoji(r){return r.map(s=>s==='correct'?'🟩':s==='present'?'🟨':'⬛').join('');}

document.getElementById('shareBtn').addEventListener('click',()=>{
  const header=`Wordle — Office Tools\n`;
  const rows=guesses.map(g=>getEmoji(evaluate(g,target))).join('\n');
  navigator.clipboard.writeText(header+rows).then(()=>toast('Copied!'));
});

function startGame(word) {
  target=word; guesses=[]; current=''; done=false;
  buildGrid(); buildKeyboard();
  document.getElementById('shareBtn').style.display='none';
  document.getElementById('newBtn').style.display='none';
  renderStats();
}

document.getElementById('modeDaily').addEventListener('click',()=>{
  daily=true;
  document.getElementById('modeDaily').classList.add('active');
  document.getElementById('modeFree').classList.remove('active');
  startGame(getDailyWord());
});
document.getElementById('modeFree').addEventListener('click',()=>{
  daily=false;
  document.getElementById('modeFree').classList.add('active');
  document.getElementById('modeDaily').classList.remove('active');
  startGame(getRandWord());
});
document.getElementById('newBtn').addEventListener('click',()=>startGame(getRandWord()));

startGame(getDailyWord());
</script>
