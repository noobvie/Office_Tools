<script src="../../js/common.js"></script>
<script>
// Live clock
function updateClock() {
  const now = Math.floor(Date.now() / 1000);
  document.getElementById('liveTs').textContent = now;
  document.getElementById('liveSub').textContent = new Date().toUTCString();
}
updateClock();
setInterval(updateClock, 1000);

document.getElementById('copyLiveBtn').addEventListener('click', function() {
  copyText(document.getElementById('liveTs').textContent, this);
});
document.getElementById('useNowTs').addEventListener('click', () => {
  document.getElementById('tsInput').value = Math.floor(Date.now() / 1000);
  document.getElementById('tsConvertBtn').click();
});

// Relative time helper
function relativeTime(date) {
  const diff = Date.now() - date.getTime();
  const abs = Math.abs(diff);
  const future = diff < 0;
  const fmt = (n, u) => `${n} ${u}${n !== 1 ? 's' : ''} ${future ? 'from now' : 'ago'}`;
  if (abs < 60000) return 'just now';
  if (abs < 3600000)  return fmt(Math.round(abs/60000), 'minute');
  if (abs < 86400000) return fmt(Math.round(abs/3600000), 'hour');
  if (abs < 2592000000) return fmt(Math.round(abs/86400000), 'day');
  if (abs < 31536000000) return fmt(Math.round(abs/2592000000), 'month');
  return fmt(Math.round(abs/31536000000), 'year');
}

function weekNumber(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

// Timestamp → Date
document.getElementById('tsConvertBtn').addEventListener('click', () => {
  const alert = document.getElementById('tsAlert');
  alert.className = ''; alert.textContent = '';
  const raw = document.getElementById('tsInput').value.trim();
  if (!raw) { alert.className='alert alert-danger'; alert.textContent='Enter a timestamp.'; return; }
  let ts = parseInt(raw);
  // Auto-detect milliseconds (13 digits)
  if (raw.length >= 13) ts = Math.floor(ts / 1000);
  const date = new Date(ts * 1000);
  if (isNaN(date.getTime())) { alert.className='alert alert-danger'; alert.textContent='Invalid timestamp.'; return; }
  document.getElementById('resUtc').textContent = date.toUTCString();
  document.getElementById('resLocal').textContent = date.toLocaleString();
  document.getElementById('resIso').textContent = date.toISOString();
  document.getElementById('resRelative').textContent = relativeTime(date);
  document.getElementById('resDow').textContent = DAYS[date.getDay()];
  document.getElementById('resWeek').textContent = 'Week ' + weekNumber(date) + ' of ' + date.getFullYear();
  document.getElementById('tsResult').classList.remove('hidden');
});

// Date → Timestamp
const today = new Date();
document.getElementById('dateInput').value = today.toISOString().split('T')[0];

document.getElementById('dateConvertBtn').addEventListener('click', () => {
  const d = document.getElementById('dateInput').value;
  const t = document.getElementById('timeInput').value || '00:00';
  const tz = document.getElementById('tzSelect').value;
  if (!d) return;
  let date;
  if (tz === 'utc') {
    date = new Date(d + 'T' + t + ':00Z');
  } else {
    date = new Date(d + 'T' + t + ':00');
  }
  const ts = Math.floor(date.getTime() / 1000);
  document.getElementById('resTs').textContent = ts;
  document.getElementById('resTsMs').textContent = ts * 1000;
  document.getElementById('dateResult').classList.remove('hidden');
});
</script>
</body>
