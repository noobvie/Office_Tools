<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Converter — Office Tools</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .converter-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: .75rem;
      align-items: end;
    }
    @media (max-width: 540px) { .converter-row { grid-template-columns: 1fr; } }

    .swap-btn {
      background: var(--bg-secondary);
      border: 1.5px solid var(--border);
      border-radius: 50%;
      width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; cursor: pointer;
      transition: background .15s, transform .2s;
      flex-shrink: 0;
      align-self: flex-end;
      margin-bottom: 1rem;
    }
    .swap-btn:hover { background: var(--primary-dim); transform: rotate(180deg); }

    .result-big {
      text-align: center;
      padding: 1.5rem;
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      margin: 1rem 0;
    }
    .result-big .amount { font-size: 2.4rem; font-weight: 900; color: var(--primary); line-height: 1.1; }
    .result-big .rate-info { font-size: .82rem; color: var(--text-muted); margin-top: .4rem; }

    .popular-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: .5rem;
      margin-top: .75rem;
    }
    .popular-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .6rem .85rem;
      font-size: .82rem;
      cursor: pointer;
      transition: border-color .12s, background .12s;
    }
    .popular-card:hover { border-color: var(--primary); background: var(--primary-dim); }
    .popular-card .pair { font-weight: 800; color: var(--primary); }
    .popular-card .rate-val { color: var(--text-muted); margin-top: .15rem; font-family: monospace; }

    .history-chart {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 60px;
      margin-top: .75rem;
      padding: 0 .25rem;
    }
    .chart-bar {
      flex: 1;
      background: var(--primary);
      opacity: .6;
      border-radius: 3px 3px 0 0;
      min-height: 4px;
      transition: opacity .15s;
      cursor: pointer;
      position: relative;
    }
    .chart-bar:hover { opacity: 1; }
    .chart-bar::after {
      content: attr(data-tip);
      position: absolute;
      bottom: 110%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: var(--bg);
      padding: .15rem .4rem;
      border-radius: 4px;
      font-size: .68rem;
      white-space: nowrap;
      display: none;
      pointer-events: none;
    }
    .chart-bar:hover::after { display: block; }

    .offline-notice { display: none; }
    .offline-mode .offline-notice { display: block; }
    .offline-mode .online-only { display: none; }

    .flag { font-size: 1.1rem; }
  </style>
</head>
<body>

<header class="site-header">
  <a href="../../index.html" class="header-logo"><span class="logo-icon">🛠️</span> Office Tools</a>
  <span class="header-tool-name">Currency Converter</span>
  <div class="header-actions">
    <button class="theme-toggle" id="themeToggle"></button>
  </div>
</header>

<main class="tool-main">
  <div class="tool-header">
    <h1>💱 Currency Converter</h1>
    <p>Live exchange rates updated daily via <a href="https://www.exchangerate-api.com" target="_blank" rel="noopener">exchangerate-api.com</a> (free tier).</p>
  </div>

  <div id="offlineNotice" class="alert alert-warning hidden">
    ⚠️ Could not load live rates. Showing cached rates or fallback approximations.
  </div>

  <!-- Converter -->
  <div class="card">
    <div class="converter-row">
      <div class="form-group">
        <label>Amount</label>
        <input type="number" id="amountInput" value="1" min="0" step="any">
      </div>
      <div>
        <button class="swap-btn" id="swapBtn" title="Swap currencies">⇄</button>
      </div>
      <div class="form-group">
        <label>Converted</label>
        <input type="number" id="resultInput" readonly style="background:var(--bg-secondary);font-weight:700;color:var(--primary)">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>From</label>
        <select id="fromCurrency"></select>
      </div>
      <div class="form-group">
        <label>To</label>
        <select id="toCurrency"></select>
      </div>
    </div>

    <div class="result-big" id="resultBig">
      <div class="amount" id="resultAmount">—</div>
      <div class="rate-info" id="rateInfo">Select currencies and enter an amount</div>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" id="convertBtn">Convert</button>
      <button class="btn btn-secondary btn-sm" id="copyResultBtn">Copy Result</button>
    </div>

    <div class="flex-between mt-2" style="font-size:.78rem;color:var(--text-muted)" id="rateFooter">
      <span id="lastUpdated"></span>
      <button class="btn btn-ghost btn-sm" id="refreshBtn" style="font-size:.75rem">↺ Refresh rates</button>
    </div>
  </div>

  <!-- Popular pairs -->
  <div class="card mt-2">
    <strong>Popular Pairs</strong>
    <div class="popular-grid" id="popularGrid"></div>
  </div>

  <!-- Quick convert table -->
  <div class="card mt-2">
    <div class="flex-between">
      <strong>Quick Convert Table</strong>
      <span class="text-muted" style="font-size:.82rem" id="tableHeader"></span>
    </div>
    <div style="overflow-x:auto;margin-top:.75rem">
      <table style="width:100%;border-collapse:collapse;font-size:.88rem" id="quickTable">
        <thead id="quickTableHead"></thead>
        <tbody id="quickTableBody"></tbody>
      </table>
    </div>
  </div>
</main>

<script src="../../js/common.js"></script>
<script>
const CURRENCIES = {
  USD:'US Dollar', EUR:'Euro', GBP:'British Pound', JPY:'Japanese Yen',
  AUD:'Australian Dollar', CAD:'Canadian Dollar', CHF:'Swiss Franc',
  CNY:'Chinese Yuan', HKD:'Hong Kong Dollar', SGD:'Singapore Dollar',
  INR:'Indian Rupee', KRW:'South Korean Won', MXN:'Mexican Peso',
  BRL:'Brazilian Real', ZAR:'South African Rand', SEK:'Swedish Krona',
  NOK:'Norwegian Krone', DKK:'Danish Krone', NZD:'New Zealand Dollar',
  THB:'Thai Baht', MYR:'Malaysian Ringgit', IDR:'Indonesian Rupiah',
  PHP:'Philippine Peso', VND:'Vietnamese Dong', AED:'UAE Dirham',
  SAR:'Saudi Riyal', TRY:'Turkish Lira', RUB:'Russian Ruble',
  PLN:'Polish Zloty', CZK:'Czech Koruna', HUF:'Hungarian Forint',
  ILS:'Israeli Shekel', CLP:'Chilean Peso', COP:'Colombian Peso',
  ARS:'Argentine Peso', EGP:'Egyptian Pound', NGN:'Nigerian Naira',
  KES:'Kenyan Shilling', GHS:'Ghanaian Cedi', UAH:'Ukrainian Hryvnia',
};

// Fallback rates (vs USD, approximate)
const FALLBACK_RATES = {
  USD:1, EUR:0.92, GBP:0.79, JPY:149.5, AUD:1.53, CAD:1.36,
  CHF:0.90, CNY:7.24, HKD:7.82, SGD:1.34, INR:83.1, KRW:1325,
  MXN:17.2, BRL:4.97, ZAR:18.6, SEK:10.4, NOK:10.6, DKK:6.88,
  NZD:1.63, THB:35.1, MYR:4.71, IDR:15600, PHP:56.5, VND:24300,
  AED:3.67, SAR:3.75, TRY:30.5, RUB:88.5, PLN:4.0, CZK:22.9,
  HUF:357, ILS:3.7, CLP:918, COP:3950, ARS:870, EGP:30.9,
  NGN:1450, KES:153, GHS:12.5, UAH:37.8,
};

const POPULAR_PAIRS = [
  ['USD','EUR'],['USD','GBP'],['USD','JPY'],['EUR','GBP'],
  ['USD','AUD'],['USD','CAD'],['GBP','EUR'],['USD','CNY'],
  ['USD','INR'],['USD','SGD'],['EUR','JPY'],['USD','CHF'],
];

let rates = null;
let lastFetch = null;

// Populate selects
function buildSelects() {
  const codes = Object.keys(CURRENCIES);
  [document.getElementById('fromCurrency'), document.getElementById('toCurrency')].forEach((sel, i) => {
    codes.forEach(code => {
      const opt = document.createElement('option');
      opt.value = code;
      opt.textContent = `${code} — ${CURRENCIES[code]}`;
      if (i === 0 && code === 'USD') opt.selected = true;
      if (i === 1 && code === 'EUR') opt.selected = true;
      sel.appendChild(opt);
    });
  });
}

async function fetchRates(base = 'USD') {
  const cacheKey = `ot-rates-${base}`;
  const cacheTs  = localStorage.getItem(`${cacheKey}-ts`);
  const cacheAge = cacheTs ? (Date.now() - parseInt(cacheTs)) / 3600000 : Infinity;

  // Use cache if < 4 hours old
  if (cacheAge < 4) {
    const cached = localStorage.getItem(cacheKey);
    if (cached) { rates = JSON.parse(cached); lastFetch = new Date(parseInt(cacheTs)); return; }
  }

  try {
    const res = await fetch(`https://open.er-api.com/v6/latest/${base}`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.result !== 'success') throw new Error('API error');
    rates = data.rates;
    lastFetch = new Date();
    localStorage.setItem(cacheKey, JSON.stringify(rates));
    localStorage.setItem(`${cacheKey}-ts`, Date.now().toString());
  } catch(e) {
    // Fall back to static rates
    rates = FALLBACK_RATES;
    document.getElementById('offlineNotice').classList.remove('hidden');
    console.warn('Currency API failed, using fallback rates:', e.message);
  }
}

function convertAmount(amount, from, to) {
  if (!rates) return null;
  const fromRate = rates[from];
  const toRate   = rates[to];
  if (!fromRate || !toRate) return null;
  return (amount / fromRate) * toRate;
}

function doConvert() {
  const amount = parseFloat(document.getElementById('amountInput').value);
  const from   = document.getElementById('fromCurrency').value;
  const to     = document.getElementById('toCurrency').value;
  if (isNaN(amount) || !rates) return;

  const result = convertAmount(amount, from, to);
  if (result === null) return;

  const formatted = result.toLocaleString('en-US', {
    minimumFractionDigits: 2,
    maximumFractionDigits: result > 1000 ? 0 : 4,
  });

  document.getElementById('resultInput').value = result.toFixed(4);
  document.getElementById('resultAmount').textContent = `${formatted} ${to}`;
  const rate1 = convertAmount(1, from, to);
  document.getElementById('rateInfo').textContent =
    `1 ${from} = ${rate1.toFixed(4)} ${to}  ·  1 ${to} = ${(1/rate1).toFixed(4)} ${from}`;
  document.getElementById('lastUpdated').textContent =
    lastFetch ? `Rates as of: ${lastFetch.toLocaleString()}` : 'Using fallback rates';
  document.getElementById('copyResultBtn').onclick = () => copyText(formatted + ' ' + to, document.getElementById('copyResultBtn'));
  renderQuickTable(from, to);
}

function renderPopular() {
  const grid = document.getElementById('popularGrid');
  grid.innerHTML = '';
  POPULAR_PAIRS.forEach(([a, b]) => {
    const rate = convertAmount(1, a, b);
    const card = document.createElement('div');
    card.className = 'popular-card';
    card.innerHTML = `<div class="pair">${a} / ${b}</div><div class="rate-val">${rate ? rate.toFixed(4) : '—'}</div>`;
    card.addEventListener('click', () => {
      document.getElementById('fromCurrency').value = a;
      document.getElementById('toCurrency').value   = b;
      doConvert();
    });
    grid.appendChild(card);
  });
}

function renderQuickTable(from, to) {
  const amounts = [1, 5, 10, 25, 50, 100, 250, 500, 1000];
  const head = document.getElementById('quickTableHead');
  const body = document.getElementById('quickTableBody');
  document.getElementById('tableHeader').textContent = `${from} → ${to}`;
  head.innerHTML = `<tr style="border-bottom:1.5px solid var(--border)"><th style="padding:.4rem .6rem;text-align:left">${from}</th><th style="padding:.4rem .6rem;text-align:left">${to}</th></tr>`;
  body.innerHTML = amounts.map((a, i) => {
    const r = convertAmount(a, from, to);
    const bg = i % 2 === 0 ? '' : `style="background:var(--bg-secondary)"`;
    return `<tr ${bg}><td style="padding:.4rem .6rem;font-weight:600">${a.toLocaleString()}</td><td style="padding:.4rem .6rem;font-family:monospace">${r ? r.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}) : '—'}</td></tr>`;
  }).join('');
}

document.getElementById('swapBtn').addEventListener('click', () => {
  const from = document.getElementById('fromCurrency').value;
  const to   = document.getElementById('toCurrency').value;
  document.getElementById('fromCurrency').value = to;
  document.getElementById('toCurrency').value   = from;
  doConvert();
});

document.getElementById('convertBtn').addEventListener('click', doConvert);
document.getElementById('amountInput').addEventListener('input', doConvert);
document.getElementById('fromCurrency').addEventListener('change', doConvert);
document.getElementById('toCurrency').addEventListener('change', doConvert);
document.getElementById('refreshBtn').addEventListener('click', async () => {
  const base = document.getElementById('fromCurrency').value;
  localStorage.removeItem(`ot-rates-${base}`);
  localStorage.removeItem(`ot-rates-${base}-ts`);
  document.getElementById('offlineNotice').classList.add('hidden');
  await fetchRates(base);
  doConvert();
  renderPopular();
});

async function init() {
  buildSelects();
  await fetchRates('USD');
  doConvert();
  renderPopular();
}

init();
</script>
</body>
</html>
