<main class="tool-main">

  <div class="card">

    <div class="flex-between mt-2">

      </table>
    </div>

<script src="../../js/common.js"></script>
<script>
// ── Data dictionaries ─────────────────────────────────────────
const FIRST_NAMES = ['Alice','Bob','Carlos','Diana','Ethan','Fatima','George','Hana','Ivan','Julia','Kevin','Layla','Mohammed','Nora','Oscar','Priya','Quincy','Rosa','Samuel','Tara','Uma','Victor','Wendy','Xander','Yasmine','Zoe','Aaron','Bella','Chris','Demi','Erik','Fiona','Gareth','Helen','Ian','Jess','Kurt','Luna','Marco','Nina','Oliver','Paula','Quinn','Rick','Sara','Thomas','Umar','Vera','Will','Xena'];
const LAST_NAMES  = ['Smith','Johnson','Williams','Brown','Jones','Garcia','Miller','Davis','Wilson','Anderson','Taylor','Thomas','Moore','Jackson','Martin','Lee','Thompson','White','Harris','Clark','Lewis','Robinson','Walker','Hall','Young','Allen','King','Wright','Hill','Scott','Green','Adams','Baker','Nelson','Carter','Mitchell','Perez','Roberts','Turner','Phillips','Campbell','Parker','Evans','Edwards','Collins','Stewart','Sanchez','Morris','Rogers','Cook'];
const DOMAINS     = ['gmail.com','yahoo.com','outlook.com','hotmail.com','example.com','test.org','mail.net','proton.me','icloud.com'];
const STREETS     = ['Main St','Oak Ave','Maple Dr','Cedar Ln','Pine Rd','Elm St','River Rd','Park Ave','Lake Dr','Hill Blvd','Forest Way','Sunset Blvd','Broadway','Market St','Church Rd'];
const CITIES      = ['New York','Los Angeles','Chicago','Houston','Phoenix','Philadelphia','San Antonio','San Diego','Dallas','San Jose','Austin','Jacksonville','Fort Worth','Columbus','Charlotte','Indianapolis','San Francisco','Seattle','Denver','Nashville','Boston','Portland','Las Vegas','Memphis','Baltimore'];
const STATES      = ['AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA','HI','ID','IL','IN','IA','KS','KY','LA','ME','MD','MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ','NM','NY','NC','ND','OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VT','VA','WA','WV','WI','WY'];
const COMPANIES   = ['Acme Corp','Globex','Initech','Umbrella LLC','Hooli','Pied Piper','Dunder Mifflin','Soylent Corp','Veridian Dynamics','Stark Industries','Wayne Enterprises','Cyberdyne Systems','Nakatomi Corp','Aperture Science','Black Mesa','Weyland Corp','Tyrell Corp','Oceanic Airlines','Bluth Company','Sterling Cooper'];
const JOB_TITLES  = ['Software Engineer','Product Manager','Data Analyst','Marketing Specialist','UX Designer','DevOps Engineer','Sales Executive','Customer Success Manager','Financial Analyst','HR Manager','Content Writer','Business Analyst','Frontend Developer','Backend Developer','Full Stack Developer','QA Engineer','Scrum Master','CTO','CEO','Operations Manager'];
const TLDS        = ['com','net','org','io','co','dev','app','tech'];
const COUNTRIES   = ['United States','Canada','United Kingdom','Australia','Germany','France','Japan','Brazil','India','Mexico','Spain','Italy','Netherlands','Sweden','Norway','South Korea','Singapore','New Zealand'];
const COLORS      = ['Red','Blue','Green','Yellow','Orange','Purple','Pink','Black','White','Gray','Brown','Cyan','Magenta','Teal','Maroon','Navy','Olive','Lime','Coral','Salmon'];
const ANIMALS     = ['Cat','Dog','Bird','Fish','Rabbit','Hamster','Turtle','Snake','Lizard','Frog','Horse','Cow','Pig','Sheep','Goat','Chicken','Duck','Goose','Peacock','Parrot'];
const LOREM_WORDS = 'lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua ut enim ad minim veniam quis nostrud exercitation ullamco laboris nisi ut aliquip'.split(' ');

// ── Generators ────────────────────────────────────────────────
function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function rndInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function pad(n, l=2) { return String(n).padStart(l,'0'); }

const GEN = {
  'First Name':  () => rnd(FIRST_NAMES),
  'Last Name':   () => rnd(LAST_NAMES),
  'Full Name':   () => `${rnd(FIRST_NAMES)} ${rnd(LAST_NAMES)}`,
  'Email':       () => {
    const fn = rnd(FIRST_NAMES).toLowerCase();
    const ln = rnd(LAST_NAMES).toLowerCase();
    return `${fn}.${ln}${rndInt(1,99)}@${rnd(DOMAINS)}`;
  },
  'Phone':       () => `+1 (${rndInt(200,999)}) ${rndInt(200,999)}-${rndInt(1000,9999)}`,
  'Address':     () => `${rndInt(1,9999)} ${rnd(STREETS)}, ${rnd(CITIES)}, ${rnd(STATES)} ${rndInt(10000,99999)}`,
  'City':        () => rnd(CITIES),
  'State':       () => rnd(STATES),
  'Country':     () => rnd(COUNTRIES),
  'ZIP Code':    () => String(rndInt(10000,99999)),
  'Company':     () => rnd(COMPANIES),
  'Job Title':   () => rnd(JOB_TITLES),
  'Website':     () => `https://www.${rnd(LAST_NAMES).toLowerCase()}${rnd(TLDS.map(t=>'.'+t))}`,
  'Username':    () => `${rnd(FIRST_NAMES).toLowerCase()}${rnd(LAST_NAMES).slice(0,4).toLowerCase()}${rndInt(10,99)}`,
  'Password':    () => {
    const chars = 'ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#$%';
    return Array.from({length:12}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
  },
  'Age':         () => String(rndInt(18,75)),
  'Date of Birth':() => {
    const y = rndInt(1950, 2005), m = rndInt(1,12), d = rndInt(1,28);
    return `${y}-${pad(m)}-${pad(d)}`;
  },
  'Date':        () => {
    const y = rndInt(2020, 2025), m = rndInt(1,12), d = rndInt(1,28);
    return `${y}-${pad(m)}-${pad(d)}`;
  },
  'Time':        () => `${pad(rndInt(0,23))}:${pad(rndInt(0,59))}:${pad(rndInt(0,59))}`,
  'UUID':        () => {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0;
      return (c==='x' ? r : (r&0x3|0x8)).toString(16);
    });
  },
  'Integer':     () => String(rndInt(1, 100000)),
  'Float':       () => (Math.random() * 10000).toFixed(2),
  'Price':       () => `$${(Math.random() * 999 + 1).toFixed(2)}`,
  'Boolean':     () => Math.random() > .5 ? 'true' : 'false',
  'Gender':      () => rnd(['Male','Female','Non-binary','Prefer not to say']),
  'Color':       () => rnd(COLORS),
  'Animal':      () => rnd(ANIMALS),
  'IP Address':  () => `${rndInt(1,254)}.${rndInt(0,254)}.${rndInt(0,254)}.${rndInt(1,254)}`,
  'Lorem':       () => {
    const len = rndInt(5, 15);
    return Array.from({length:len}, () => rnd(LOREM_WORDS)).join(' ') + '.';
  },
};

const DEFAULT_ACTIVE = ['Full Name','Email','Phone','Company','Job Title','Country'];
const ALL_FIELDS = Object.keys(GEN);
let activeFields = [...DEFAULT_ACTIVE];
let generatedData = [];

// Build chips
function buildChips() {
  const container = document.getElementById('fieldChips');
  container.innerHTML = '';
  ALL_FIELDS.forEach(f => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (activeFields.includes(f) ? ' active' : '');
    chip.textContent = f;
    chip.addEventListener('click', () => {
      if (activeFields.includes(f)) {
        activeFields = activeFields.filter(x => x !== f);
        chip.classList.remove('active');
      } else {
        activeFields.push(f);
        chip.classList.add('active');
      }
    });
    container.appendChild(chip);
  });
}

document.getElementById('selectAllBtn').addEventListener('click', () => {
  activeFields = [...ALL_FIELDS];
  buildChips();
});
document.getElementById('clearBtn').addEventListener('click', () => {
  activeFields = [];
  buildChips();
});
document.getElementById('rowCount').addEventListener('input', e => {
  document.getElementById('rowCountVal').textContent = e.target.value;
});
document.getElementById('generateBtn').addEventListener('click', generate);

function generate() {
  if (activeFields.length === 0) { alert('Select at least one field.'); return; }
  const rows = +document.getElementById('rowCount').value;
  generatedData = Array.from({length:rows}, () => {
    // Shared name for this row so First Name / Last Name / Full Name / Email / Username all match
    const rowFirst = rnd(FIRST_NAMES);
    const rowLast  = rnd(LAST_NAMES);
    const row = {};
    activeFields.forEach(f => {
      switch (f) {
        case 'First Name': row[f] = rowFirst; break;
        case 'Last Name':  row[f] = rowLast;  break;
        case 'Full Name':  row[f] = `${rowFirst} ${rowLast}`; break;
        case 'Email':      row[f] = `${rowFirst.toLowerCase()}.${rowLast.toLowerCase()}${rndInt(1,99)}@${rnd(DOMAINS)}`; break;
        case 'Username':   row[f] = `${rowFirst.toLowerCase()}${rowLast.slice(0,4).toLowerCase()}${rndInt(10,99)}`; break;
        default:           row[f] = GEN[f]();
      }
    });
    return row;
  });
  renderTable();
}

function renderTable() {
  const card = document.getElementById('previewCard');
  card.classList.remove('hidden');
  document.getElementById('previewCount').textContent = `— ${generatedData.length} rows`;

  const head = document.getElementById('tableHead');
  const body = document.getElementById('tableBody');
  head.innerHTML = '<tr>' + activeFields.map(f => `<th>${f}</th>`).join('') + '</tr>';
  body.innerHTML = generatedData.map(row =>
    '<tr>' + activeFields.map(f => `<td>${escHtml(row[f])}</td>`).join('') + '</tr>'
  ).join('');
}

function toCSV() {
  const header = activeFields.map(f => `"${f}"`).join(',');
  const rows   = generatedData.map(r => activeFields.map(f => `"${String(r[f]).replace(/"/g,'""')}"`).join(','));
  return [header, ...rows].join('\n');
}

document.getElementById('dlCsvBtn').addEventListener('click', () => {
  const blob = new Blob([toCSV()], {type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'fake-data.csv'; a.click();
});

document.getElementById('dlJsonBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(generatedData, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'fake-data.json'; a.click();
});

document.getElementById('copyCsvBtn').addEventListener('click', () => {
  copyText(toCSV(), document.getElementById('copyCsvBtn'));
});

buildChips();
generate();
</script>
</body>
</html>
