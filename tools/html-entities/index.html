<script>
document.querySelectorAll('.tab-bar button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tabTarget).classList.add('active');
  });
});

function encode(str, nonAscii) {
  let out = '';
  for (const ch of str) {
    const cp = ch.codePointAt(0);
    if (ch === '&') out += '&amp;';
    else if (ch === '<') out += '&lt;';
    else if (ch === '>') out += '&gt;';
    else if (ch === '"') out += '&quot;';
    else if (ch === "'") out += '&#39;';
    else if (nonAscii && cp > 127) out += `&#${cp};`;
    else out += ch;
  }
  return out;
}

function decode(str) {
  const d = document.createElement('div');
  d.innerHTML = str;
  return d.textContent;
}

document.getElementById('encInput').addEventListener('input', () => {
  const nonAscii = document.getElementById('encNonAscii').checked;
  document.getElementById('encOutput').value = encode(document.getElementById('encInput').value, nonAscii);
});
document.getElementById('encNonAscii').addEventListener('change', () => {
  const nonAscii = document.getElementById('encNonAscii').checked;
  document.getElementById('encOutput').value = encode(document.getElementById('encInput').value, nonAscii);
});
document.getElementById('decInput').addEventListener('input', () => {
  document.getElementById('decOutput').value = decode(document.getElementById('decInput').value);
});
document.getElementById('copyEnc').addEventListener('click', function() { copyText(document.getElementById('encOutput').value, this); });
document.getElementById('copyDec').addEventListener('click', function() { copyText(document.getElementById('decOutput').value, this); });

function dlText(text, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], { type: 'text/plain' }));
  a.download = filename; a.click(); URL.revokeObjectURL(a.href);
}
document.getElementById('dlEnc').addEventListener('click', () => dlText(document.getElementById('encOutput').value, 'encoded.txt'));
document.getElementById('dlDec').addEventListener('click', () => dlText(document.getElementById('decOutput').value, 'decoded.txt'));

// Reference table

  { char: '…', name: 'ellipsis',     dec: '&#8230;',hex: '&#x2026;',entity: '&hellip;' },
  { char: '—', name: 'em dash',      dec: '&#8212;',hex: '&#x2014;',entity: '&mdash;' },
  { char: '–', name: 'en dash',      dec: '&#8211;',hex: '&#x2013;',entity: '&ndash;' },
  { char: '"', name: 'left dquote',  dec: '&#8220;',hex: '&#x201C;',entity: '&ldquo;' },
  { char: '"', name: 'right dquote', dec: '&#8221;',hex: '&#x201D;',entity: '&rdquo;' },
  { char: '←', name: 'left arrow',   dec: '&#8592;',hex: '&#x2190;',entity: '&larr;' },
  { char: '→', name: 'right arrow',  dec: '&#8594;',hex: '&#x2192;',entity: '&rarr;' },
  { char: '↑', name: 'up arrow',     dec: '&#8593;',hex: '&#x2191;',entity: '&uarr;' },

const tbody = document.getElementById('refBody');
ENTITIES.forEach(e => {
  const tr = document.createElement('tr');
  tr.title = 'Click to copy entity';
  tr.innerHTML = `<td class="char-cell">${e.char === ' ' ? '&nbsp;' : escHtml(e.char)}</td><td>${escHtml(e.name)}</td><td>${escHtml(e.dec)}</td><td>${escHtml(e.hex)}</td><td><strong>${escHtml(e.entity)}</strong></td>`;
  tr.addEventListener('click', () => copyText(e.entity, tr));
  tbody.appendChild(tr);
});
</script>
