<script>
function b64urlDecode(str) {
  str = str.replace(/-/g, '+').replace(/_/g, '/');
  const pad = (4 - str.length % 4) % 4;
  str += '='.repeat(pad);
  return atob(str);
}

function syntaxHighlight(obj) {
  const json = JSON.stringify(obj, null, 2);
  return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
    if (/^"/.test(match)) {
      if (/:$/.test(match)) return `<span class="jv-key">${escHtml(match)}</span>`;
      return `<span class="jv-str">${escHtml(match)}</span>`;
    }
    if (/true|false/.test(match)) return `<span class="jv-bool">${match}</span>`;
    if (/null/.test(match)) return `<span class="jv-null">${match}</span>`;
    return `<span class="jv-num">${match}</span>`;
  });
}

function annotatePayload(payload) {
  const now = Math.floor(Date.now() / 1000);
  const json = JSON.stringify(payload, null, 2);
  const lines = json.split('\n');
  const tsKeys = { exp: true, iat: true, nbf: true };
  return lines.map(line => {
    const km = line.match(/"(exp|iat|nbf)"\s*:\s*(\d+)/);
    let out = line.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
      if (/^"/.test(match)) {
        if (/:$/.test(match)) return `<span class="jv-key">${escHtml(match)}</span>`;
        return `<span class="jv-str">${escHtml(match)}</span>`;
      }
      if (/true|false/.test(match)) return `<span class="jv-bool">${match}</span>`;
      if (/null/.test(match)) return `<span class="jv-null">${match}</span>`;
      return `<span class="jv-num">${match}</span>`;
    });
    if (km) {
      const ts = parseInt(km[2]);
      const d  = new Date(ts * 1000);
      out += `<span class="ts-hint">← ${escHtml(d.toLocaleString())}</span>`;
    }
    return out;
  }).join('\n');
}

let debounceTimer;
document.getElementById('jwtInput').addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(decode, 200);
});

function decode() {
  const val = document.getElementById('jwtInput').value.trim();
  const errEl = document.getElementById('jwtError');
  const outEl = document.getElementById('jwtOutput');
  const statusEl = document.getElementById('jwtStatus');

  errEl.classList.add('hidden');
  outEl.classList.add('hidden');
  statusEl.innerHTML = '';

  if (!val) return;

  const parts = val.split('.');
  if (parts.length !== 3) {
    errEl.textContent = 'Invalid JWT format — expected 3 dot-separated parts.';
    errEl.classList.remove('hidden');
    return;
  }

  let header, payload;
  try {
    header  = JSON.parse(b64urlDecode(parts[0]));
    payload = JSON.parse(b64urlDecode(parts[1]));
  } catch(e) {
    errEl.textContent = 'Failed to decode JWT: ' + e.message;
    errEl.classList.remove('hidden');
    return;
  }

  // Status
  const now = Math.floor(Date.now() / 1000);
  let statusHtml = '<span class="status-badge status-valid">✓ Valid structure</span>';
  if (payload.exp && payload.exp < now) {
    statusHtml = '<span class="status-badge status-expired">✗ Expired</span> <span class="ts-hint">expired ' + new Date(payload.exp*1000).toLocaleString() + '</span>';
  } else if (payload.nbf && payload.nbf > now) {
    statusHtml = '<span class="status-badge status-nbf">⚠ Not yet valid</span> <span class="ts-hint">valid from ' + new Date(payload.nbf*1000).toLocaleString() + '</span>';
  }
  statusEl.innerHTML = statusHtml;

  // Alg badge
  document.getElementById('algBadge').innerHTML = header.alg ? `<span class="badge badge-primary">${escHtml(header.alg)}</span>` : '';

  document.getElementById('jwtHeader').innerHTML  = syntaxHighlight(header);
  document.getElementById('jwtPayload').innerHTML = annotatePayload(payload);
  document.getElementById('jwtSig').textContent   = parts[2];

  outEl.classList.remove('hidden');
}

// Decode sample on load
decode();
</script>
