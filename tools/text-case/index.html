<main class="tool-main">
  <div class="tool-header">
    <h1>🔡 Text Case Converter</h1>
    <p>Convert text between 9 different cases. All results update live as you type.</p>
  </div>

  <div class="card">
    <label class="form-label">Input Text</label>
    <textarea class="tc-input" id="tcInput" placeholder="Type or paste text here…">The quick brown fox jumps over the lazy dog</textarea>
    <div class="stats-row" id="tcStats">Words: 9 · Characters: 43</div>
  </div>

  <div class="card mt-2" id="tcResults"></div>
</main>

<script src="../../js/config.js"></script>
<script src="../../js/common.js"></script>
<script>
function toWords(str) {
  // Split on non-alphanumeric (spaces, hyphens, underscores, etc.)
  return str.replace(/([a-z])([A-Z])/g, '$1 $2')
            .replace(/([A-Z]+)([A-Z][a-z])/g, '$1 $2')
            .split(/[\s\-_\/\.]+/)
            .filter(w => w.length > 0);
}

const CASES = [
  { label: 'UPPERCASE',     fn: s => s.toUpperCase() },
  { label: 'lowercase',     fn: s => s.toLowerCase() },
  { label: 'Title Case',    fn: s => toWords(s).map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ') },
  { label: 'Sentence case', fn: s => {
    const lower = s.toLowerCase();
    return lower.replace(/(^\s*\w|[.!?]\s+\w)/g, m => m.toUpperCase());
  }},
  { label: 'camelCase',     fn: s => { const w = toWords(s); return w[0].toLowerCase() + w.slice(1).map(w2 => w2.charAt(0).toUpperCase() + w2.slice(1).toLowerCase()).join(''); } },
  { label: 'PascalCase',    fn: s => toWords(s).map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join('') },
  { label: 'snake_case',    fn: s => toWords(s).map(w => w.toLowerCase()).join('_') },
  { label: 'kebab-case',    fn: s => toWords(s).map(w => w.toLowerCase()).join('-') },
  { label: 'CONSTANT_CASE', fn: s => toWords(s).map(w => w.toUpperCase()).join('_') },
];

function buildResults() {
  const resDiv = document.getElementById('tcResults');
  resDiv.innerHTML = CASES.map((c, i) => `
    <div class="tc-row">
      <div class="tc-label">${escHtml(c.label)}</div>
      <div class="tc-value" id="tcVal${i}"></div>
      <button class="btn btn-sm btn-secondary" id="tcCopy${i}">Copy</button>
    </div>
  `).join('');
  CASES.forEach((c, i) => {
    document.getElementById(`tcCopy${i}`).addEventListener('click', function() {
      copyText(document.getElementById(`tcVal${i}`).textContent, this);
    });
  });
}

function update() {
  const text = document.getElementById('tcInput').value;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  document.getElementById('tcStats').textContent = `Words: ${words} · Characters: ${text.length}`;
  CASES.forEach((c, i) => {
    document.getElementById(`tcVal${i}`).textContent = text ? c.fn(text) : '';
  });
}

buildResults();
document.getElementById('tcInput').addEventListener('input', update);
update();
</script>
