Bob

<script src="../../js/common.js"></script>
<script>
const PALETTE = [
  '#6366f1','#8b5cf6','#ec4899','#ef4444','#f97316',
  '#eab308','#22c55e','#14b8a6','#0ea5e9','#6366f1',
  '#a855f7','#d946ef','#f43f5e','#fb923c','#84cc16',
  '#10b981','#06b6d4','#3b82f6','#9333ea','#e11d48',
];

const canvas = document.getElementById('wheelCanvas');
const ctx    = canvas.getContext('2d');
let names    = [];
let spinning = false;
let stopRequested = false;
let currentAngle = 0;
let history  = [];
let spinCount = 0;

// Audio context for tick sound
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playTick() {
  if (!document.getElementById('soundOn').checked) return;
  try {
    const ac = getAudioCtx();
    const o  = ac.createOscillator();
    const g  = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.frequency.value = 800;
    g.gain.setValueAtTime(.18, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.08);
    o.start(); o.stop(ac.currentTime + 0.08);
  } catch(e) {}
}
function playWin() {
  if (!document.getElementById('soundOn').checked) return;
  try {
    const ac = getAudioCtx();
    [523, 659, 784, 1047].forEach((freq, i) => {
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.frequency.value = freq;
      const t = ac.currentTime + i * 0.12;
      g.gain.setValueAtTime(.2, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
      o.start(t); o.stop(t + 0.18);
    });
  } catch(e) {}
}

function parseNames() {
  return document.getElementById('namesList').value
    .split('\n')
    .map(n => n.trim())
    .filter(n => n.length > 0);
}

function drawWheel(angle) {
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const r  = cx - 16;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (names.length === 0) {
    ctx.fillStyle = '#94a3b8';
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px system-ui';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('Add names →', cx, cy);
    return;
  }

  const slice = (Math.PI * 2) / names.length;

  names.forEach((name, i) => {
    const start = angle + i * slice;
    const end   = start + slice;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = PALETTE[i % PALETTE.length];
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Text
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + slice / 2);
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    const maxLen = r * 0.65;
    let fontSize = Math.min(16, Math.max(9, 700 / names.length));
    ctx.font = `bold ${fontSize}px system-ui`;
    let label = name;
    while (ctx.measureText(label).width > maxLen && label.length > 3) {
      label = label.slice(0,-1);
    }
    if (label !== name) label = label.slice(0,-1) + '…';
    ctx.shadowColor = 'rgba(0,0,0,.4)';
    ctx.shadowBlur  = 3;
    ctx.fillText(label, r - 12, 0);
    ctx.restore();
  });

  // Center circle
  ctx.beginPath();
  ctx.arc(cx, cy, 22, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.shadowColor = 'rgba(0,0,0,.25)';
  ctx.shadowBlur  = 6;
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#475569';
  ctx.font = 'bold 14px system-ui';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('🎡', cx, cy);
}

function getWinner(finalAngle) {
  if (names.length === 0) return null;
  const slice = (Math.PI * 2) / names.length;
  // Pointer is at right side (angle=0 in canvas coords = rightward)
  const normalized = (((-finalAngle) % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  const idx = Math.floor(normalized / slice) % names.length;
  return names[idx];
}

function spin() {
  const btn = document.getElementById('spinBtn');

  // Click while spinning = stop early
  if (spinning) { stopRequested = true; return; }
  if (names.length === 0) return;

  spinning = true;
  stopRequested = false;
  document.getElementById('winnerBanner').style.display = 'none';
  btn.textContent = '⏹ Stop';

  const duration = +document.getElementById('spinDuration').value;
  const extraSpins = (3 + Math.random() * 5) * Math.PI * 2;
  const targetDelta = extraSpins + Math.random() * Math.PI * 2;
  const startAngle = currentAngle;
  const start = performance.now();

  const slice = (Math.PI * 2) / names.length;
  let lastSlice = -1;

  function frame(now) {
    let t;
    if (stopRequested) {
      t = 1;
    } else {
      const elapsed = now - start;
      t = Math.min(elapsed / duration, 1);
    }
    // Ease out cubic
    const ease = 1 - Math.pow(1 - t, 3);
    currentAngle = startAngle + targetDelta * ease;
    drawWheel(currentAngle);

    // Tick sound on each new slice
    const normalized = (((-currentAngle) % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
    const curSlice = Math.floor(normalized / slice) % names.length;
    if (curSlice !== lastSlice) { playTick(); lastSlice = curSlice; }

    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      spinning = false;
      stopRequested = false;
      btn.textContent = '🎡 Spin!';
      const winner = getWinner(currentAngle);
      showWinner(winner);
      playWin();
    }
  }
  requestAnimationFrame(frame);
}

function showWinner(name) {
  document.getElementById('winnerName').textContent = name;
  document.getElementById('winnerBanner').style.display = '';
  spinCount++;
  history.unshift({ spin: spinCount, name });
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('historyList');
  if (history.length === 0) {
    el.innerHTML = '<span class="text-muted" style="font-size:.82rem">No spins yet.</span>';
    return;
  }
  el.innerHTML = history.slice(0,20).map((h,i) =>
    `<div class="history-item"><span class="place">#${h.spin}</span><span>${escHtml(h.name)}</span></div>`
  ).join('');
}

function updateWheel() {
  names = parseNames();
  document.getElementById('nameCount').textContent = `(${names.length})`;
  drawWheel(currentAngle);
  document.getElementById('winnerBanner').style.display = 'none';
}

document.getElementById('spinBtn').addEventListener('click', spin);
document.getElementById('updateBtn').addEventListener('click', updateWheel);
document.getElementById('namesList').addEventListener('input', updateWheel);
document.getElementById('clearNamesBtn').addEventListener('click', () => {
  document.getElementById('namesList').value = '';
  updateWheel();
});
document.getElementById('shuffleBtn').addEventListener('click', () => {
  const arr = parseNames();
  for (let i = arr.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  document.getElementById('namesList').value = arr.join('\n');
  updateWheel();
});
document.getElementById('removeWinnerBtn').addEventListener('click', () => {
  const winner = document.getElementById('winnerName').textContent;
  const arr = parseNames().filter(n => n !== winner);
  document.getElementById('namesList').value = arr.join('\n');
  document.getElementById('winnerBanner').style.display = 'none';
  updateWheel();
});
document.getElementById('keepWinnerBtn').addEventListener('click', () => {
  document.getElementById('winnerBanner').style.display = 'none';
  spin();
});
document.getElementById('clearHistoryBtn').addEventListener('click', () => {
  history = []; spinCount = 0; renderHistory();
});

updateWheel();
</script>
</body>
