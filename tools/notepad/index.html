    <p>Auto-saves to your browser. Up to 5 named notes — double-click a tab to rename it.</p>

    </div>
    <div class="btn-group mt-2">
      <button class="btn btn-secondary" id="npDownload">Download .txt</button>
      <button class="btn btn-secondary" id="npCopy">Copy All</button>

    </div>
  </div>
</main>

<script src="../../js/config.js"></script>
<script src="../../js/common.js"></script>
<script>
const NUM_TABS = 5;
const PREFIX   = 'ot-notepad-';
let activeTab  = parseInt(localStorage.getItem(PREFIX + 'active') || '0');
let saveTimer  = null;

function getNote(i)       { return localStorage.getItem(PREFIX + 'note-' + i) || ''; }
function getTabName(i)    { return localStorage.getItem(PREFIX + 'name-' + i) || ('Note ' + (i + 1)); }
function setNote(i, v)    { localStorage.setItem(PREFIX + 'note-' + i, v); }
function setTabName(i, v) { localStorage.setItem(PREFIX + 'name-' + i, v); }

function buildTabs() {
  const strip = document.getElementById('tabStrip');
  strip.innerHTML = '';
  for (let i = 0; i < NUM_TABS; i++) {
    const tab = document.createElement('div');
    tab.className = 'np-tab' + (i === activeTab ? ' active' : '');
    tab.dataset.idx = i;
    const nameSpan = document.createElement('span');
    nameSpan.className = 'np-tab-name';
    nameSpan.textContent = getTabName(i);
    nameSpan.contentEditable = 'false';
    tab.appendChild(nameSpan);
    tab.addEventListener('click', () => switchTab(i));
    tab.addEventListener('dblclick', e => {
      e.preventDefault();
      nameSpan.contentEditable = 'true';
      nameSpan.focus();
      const range = document.createRange(); range.selectNodeContents(nameSpan);
      window.getSelection().removeAllRanges(); window.getSelection().addRange(range);
    });
    nameSpan.addEventListener('blur', () => {
      nameSpan.contentEditable = 'false';
      setTabName(i, nameSpan.textContent.trim() || ('Note ' + (i+1)));
      nameSpan.textContent = getTabName(i);
    });
    nameSpan.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); nameSpan.blur(); }
    });
    strip.appendChild(tab);
  }
}

function switchTab(i) {
  activeTab = i;
  localStorage.setItem(PREFIX + 'active', i);
  buildTabs();
  document.getElementById('npArea').value = getNote(i);
  updateStats();
}

function updateStats() {
  const text = document.getElementById('npArea').value;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  document.getElementById('npStats').textContent = `Words: ${words} · Characters: ${text.length}`;
}

function showSaved() {
  const el = document.getElementById('saveIndicator');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

document.getElementById('npArea').addEventListener('input', () => {
  updateStats();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    setNote(activeTab, document.getElementById('npArea').value);
    showSaved();
  }, 500);
});

document.getElementById('npDownload').addEventListener('click', () => {
  const text = document.getElementById('npArea').value;
  const name = getTabName(activeTab).replace(/[^a-z0-9]/gi, '_') || 'note';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], { type: 'text/plain' }));
  a.download = name + '.txt'; a.click(); URL.revokeObjectURL(a.href);
});

document.getElementById('npCopy').addEventListener('click', function() {
  copyText(document.getElementById('npArea').value, this);
});

document.getElementById('npClear').addEventListener('click', () => {
  if (!confirm('Clear this note?')) return;
  document.getElementById('npArea').value = '';
  setNote(activeTab, '');
  updateStats();
});

buildTabs();
document.getElementById('npArea').value = getNote(activeTab);
updateStats();
</script>
