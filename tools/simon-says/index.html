<script>
initThemeToggle('themeToggle');

const BEST_KEY = 'ot-simon-best';
const BTNS  = [document.getElementById('sRed'), document.getElementById('sGreen'), document.getElementById('sBlue'), document.getElementById('sYellow')];
const FREQS = [261, 329, 392, 523]; // C4 E4 G4 C5
let seq=[], step=0, playing=false, accepting=false;
let audioCtx = null;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(idx, dur=120) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain= ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = FREQS[idx];
    gain.gain.setValueAtTime(.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + dur/1000);
    osc.start(); osc.stop(ctx.currentTime + dur/1000);
  } catch(e){}
}

function lightUp(idx, dur=320) {
  return new Promise(res => {
    BTNS[idx].classList.add('lit');
    playTone(idx, dur - 80);
    setTimeout(() => { BTNS[idx].classList.remove('lit'); res(); }, dur);
  });
}

function setStatus(msg, cls='') {
  const el = document.getElementById('status');
  el.textContent = msg; el.className = cls;
}

function setBtnsDisabled(val) {
  BTNS.forEach(b => b.disabled = val);
}

async function playSequence() {
  accepting = false;
  setBtnsDisabled(true);
  setStatus('Watch carefully…');
  const delay = Math.max(200, 600 - Math.floor(seq.length/5)*20);
  for (const idx of seq) {
    await lightUp(idx, delay);
    await new Promise(r=>setTimeout(r,80));
  }
  accepting = true;
  step = 0;
  setBtnsDisabled(false);
  setStatus('Your turn! (' + seq.length + ' steps)');
}

function updateBest(n) {
  const b = parseInt(localStorage.getItem(BEST_KEY)||0);
  const nb = Math.max(n,b);
  localStorage.setItem(BEST_KEY, nb);
  document.getElementById('best').textContent = nb;
}

function startGame() {
  seq = []; step = 0; playing = true;
  document.getElementById('startBtn').textContent = '↩ Restart';
  updateBest(0);
  nextRound();
}

function nextRound() {
  seq.push(Math.floor(Math.random()*4));
  document.getElementById('round').textContent = seq.length;
  setTimeout(playSequence, 600);
}

BTNS.forEach((btn, idx) => {
  btn.addEventListener('click', async () => {
    if (!accepting) return;
    await lightUp(idx, 200);
    if (idx !== seq[step]) {
      // wrong
      accepting = false;
      setBtnsDisabled(true);
      setStatus('❌ Wrong! Game over — round ' + seq.length, 'bad');
      updateBest(seq.length - 1);
      playing = false;
      document.getElementById('startBtn').textContent = '▶ Start';
      document.getElementById('round').textContent = '—';
      return;
    }
    step++;
    if (step === seq.length) {
      accepting = false;
      setBtnsDisabled(true);
      setStatus('✅ Correct! Get ready…', 'ok');
      updateBest(seq.length);
      setTimeout(nextRound, 1000);
    }
  });
});

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('best').textContent = localStorage.getItem(BEST_KEY)||0;
</script>
