<script>
const KEYWORDS = ['SELECT','FROM','WHERE','AND','OR','NOT','IN','JOIN','LEFT JOIN','RIGHT JOIN','INNER JOIN',
  'OUTER','FULL','ON','GROUP BY','ORDER BY','HAVING','LIMIT','OFFSET','INSERT','INTO','VALUES','UPDATE',
  'SET','DELETE','CREATE','TABLE','INDEX','DROP','ALTER','ADD','COLUMN','PRIMARY','KEY','FOREIGN',
  'REFERENCES','DISTINCT','AS','CASE','WHEN','THEN','ELSE','END','UNION','ALL','WITH','EXISTS',
  'NULL','IS','BETWEEN','LIKE','COUNT','SUM','AVG','MAX','MIN','LEFT','RIGHT','INNER','OUTER','FULL'];

const NEWLINE_BEFORE = ['SELECT','FROM','WHERE','GROUP BY','ORDER BY','HAVING','LIMIT','OFFSET',
  'UNION','UNION ALL','JOIN','LEFT JOIN','RIGHT JOIN','INNER JOIN','OUTER JOIN','FULL OUTER JOIN',
  'INSERT','INTO','VALUES','UPDATE','SET','DELETE','CREATE','DROP','ALTER','WITH'];

const INDENT_AFTER = ['SELECT','INSERT','UPDATE','SET','VALUES'];

function getIndent() {
  const v = document.getElementById('indent').value;
  return v === 'tab' ? '\t' : ' '.repeat(parseInt(v));
}

function applyCase(word, mode) {
  if (mode === 'upper') return word.toUpperCase();
  if (mode === 'lower') return word.toLowerCase();
  return word;
}

function tokenize(sql) {
  // Split into tokens: strings, comments, identifiers, keywords, operators, whitespace
  const re = /('(?:''|[^'])*'|"(?:""|[^"])*"|--[^\n]*|\/\*[\s\S]*?\*\/|[A-Za-z_][A-Za-z0-9_]*|\d+(?:\.\d+)?|[^\s]|\s+)/g;
  return sql.match(re) || [];
}

function formatSQL(sql) {
  const kwCase    = document.getElementById('kwCase').value;
  const indentStr = getIndent();
  const commaEnd  = document.getElementById('commaStyle').value === 'end';

  const tokens = tokenize(sql);
  let out = '';
  let indent = 0;
  let i = 0;
  let lastNonWs = '';

  // Build multi-word keywords lookup
  const kwSet = new Set(KEYWORDS.map(k => k.toUpperCase()));
  const nlSet = new Set(NEWLINE_BEFORE.map(k => k.toUpperCase()));

  // Try to match multi-word keywords starting at position i
  function matchMulti(arr, pos) {
    const tries = ['GROUP BY','ORDER BY','LEFT JOIN','RIGHT JOIN','INNER JOIN','FULL OUTER JOIN','OUTER JOIN','UNION ALL'];
    for (const t of tries) {
      const words = t.split(' ');
      let ok = true;
      let ti = pos;
      for (const w of words) {
        while (ti < arr.length && /^\s+$/.test(arr[ti])) ti++;
        if (ti >= arr.length || arr[ti].toUpperCase() !== w) { ok = false; break; }
        ti++;
      }
      if (ok) return { kw: t, advance: ti - pos };
    }
    return null;
  }

  const processed = [];
  while (i < tokens.length) {
    const tok = tokens[i];
    if (/^\s+$/.test(tok)) { i++; continue; } // skip whitespace tokens, we control spacing

    // Try multi-word
    const multi = matchMulti(tokens, i);
    if (multi) {
      processed.push({ type: 'kw', val: applyCase(multi.kw, kwCase), orig: multi.kw });
      i += multi.advance;
      continue;
    }

    const upper = tok.toUpperCase();
    if (kwSet.has(upper) && !/^'|^"/.test(tok)) {
      processed.push({ type: 'kw', val: applyCase(tok, kwCase), orig: upper });
    } else if (tok === ',') {
      processed.push({ type: 'comma' });
    } else if (tok === '(') {
      processed.push({ type: 'open' });
    } else if (tok === ')') {
      processed.push({ type: 'close' });
    } else if (/^--/.test(tok) || /^\/\*/.test(tok)) {
      processed.push({ type: 'comment', val: tok });
    } else {
      processed.push({ type: 'val', val: tok });
    }
    i++;
  }

  let lines = [];
  let curLine = '';
  let depth = 0;

  function pushLine() {
    if (curLine.trim()) lines.push(indentStr.repeat(depth) + curLine.trim());
    curLine = '';
  }

  for (let j = 0; j < processed.length; j++) {
    const t = processed[j];
    if (t.type === 'kw') {
      if (nlSet.has(t.orig.toUpperCase())) {
        pushLine();
        curLine = t.val;
        if (INDENT_AFTER.includes(t.orig.toUpperCase())) {
          // next tokens indented
        }
      } else {
        curLine += (curLine.trim() ? ' ' : '') + t.val;
      }
    } else if (t.type === 'comma') {
      if (commaEnd) {
        curLine += ',';
        pushLine();
      } else {
        pushLine();
        curLine = ', ';
      }
    } else if (t.type === 'open') {
      curLine += '(';
      depth++;
    } else if (t.type === 'close') {
      depth = Math.max(0, depth - 1);
      curLine += ')';
    } else if (t.type === 'comment') {
      pushLine();
      lines.push(indentStr.repeat(depth) + t.val.trim());
    } else {
      curLine += (curLine.trim() ? ' ' : '') + t.val;
    }
  }
  pushLine();

  return lines.join('\n');
}

function minifySQL(sql) {
  // Remove comments, collapse whitespace
  return sql
    .replace(/--[^\n]*/g, '')
    .replace(/\/\*[\s\S]*?\*\//g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

document.getElementById('fmtBtn').addEventListener('click', () => {
  document.getElementById('sqlOut').value = formatSQL(document.getElementById('sqlIn').value);
});
document.getElementById('minBtn').addEventListener('click', () => {
  document.getElementById('sqlOut').value = minifySQL(document.getElementById('sqlIn').value);
});
document.getElementById('copyOut').addEventListener('click', function() {
  copyText(document.getElementById('sqlOut').value, this);
});

// Auto-format on load
formatSQL && (document.getElementById('sqlOut').value = formatSQL(document.getElementById('sqlIn').value));
</script>
