<header class="site-header">
  <a href="../../index.html" class="header-logo"><span class="logo-icon">🛠️</span> Office Tools</a>

<main class="tool-main">
  <div class="tool-header">
    <h1>🔢 Number Base Converter</h1>
    <p>Convert between binary, octal, decimal, and hexadecimal. Edit any field — all others update instantly.</p>
  </div>

  <div class="card">
    <div class="base-grid">
      <div class="base-field">
        <div class="base-label">
          Binary (base 2)
          <button class="btn btn-sm btn-secondary" id="copyBin">Copy</button>
        </div>
        <input type="text" id="fBin" class="base-input" placeholder="0 or 1" spellcheck="false" value="1010">
      </div>
      <div class="base-field">
        <div class="base-label">
          Octal (base 8)
          <button class="btn btn-sm btn-secondary" id="copyOct">Copy</button>
        </div>
        <input type="text" id="fOct" class="base-input" placeholder="0–7" spellcheck="false">
      </div>
      <div class="base-field">
        <div class="base-label">
          Decimal (base 10)
          <button class="btn btn-sm btn-secondary" id="copyDec">Copy</button>
        </div>
        <input type="text" id="fDec" class="base-input" placeholder="0–9" spellcheck="false">
      </div>
      <div class="base-field">
        <div class="base-label">
          Hexadecimal (base 16)
          <button class="btn btn-sm btn-secondary" id="copyHex">Copy</button>
        </div>
        <input type="text" id="fHex" class="base-input" placeholder="0–9 A–F" spellcheck="false">
      </div>
    </div>
    <div id="bcError" class="alert alert-danger mt-2 hidden"></div>
  </div>

  <div class="card mt-2" id="infoCard" style="display:none">
    <div style="font-weight:700;margin-bottom:.5rem">Bit Analysis</div>
    <div class="info-card" id="infoGrid"></div>
  </div>
</main>

<script src="../../js/config.js"></script>
<script src="../../js/common.js"></script>
<script>
const PATTERNS = { fBin: /^[01]+$/, fOct: /^[0-7]+$/, fDec: /^\d+$/, fHex: /^[0-9a-fA-F]+$/ };
const BASES    = { fBin: 2, fOct: 8, fDec: 10, fHex: 16 };
let updating = false;

function convert(sourceId) {
  if (updating) return;
  updating = true;
  const errEl = document.getElementById('bcError');
  errEl.classList.add('hidden');
  ['fBin','fOct','fDec','fHex'].forEach(id => document.getElementById(id).classList.remove('error'));

  const raw = document.getElementById(sourceId).value.trim();

  if (!raw) {
    ['fBin','fOct','fDec','fHex'].forEach(id => { if (id !== sourceId) document.getElementById(id).value = ''; });
    document.getElementById('infoCard').style.display = 'none';
    updating = false;
    return;
  }

  if (!PATTERNS[sourceId].test(raw)) {
    document.getElementById(sourceId).classList.add('error');
    errEl.textContent = 'Invalid characters for base ' + BASES[sourceId];
    errEl.classList.remove('hidden');
    document.getElementById('infoCard').style.display = 'none';
    updating = false;
    return;
  }

  const val = BigInt('0' + (sourceId === 'fHex' ? 'x' : sourceId === 'fOct' ? 'o' : sourceId === 'fBin' ? 'b' : '') + (sourceId === 'fDec' ? raw : '') + (sourceId !== 'fDec' ? raw : ''));
  // Use BigInt parsing:
  let bigVal;
  try {
    if (sourceId === 'fBin') bigVal = BigInt('0b' + raw);
    else if (sourceId === 'fOct') bigVal = BigInt('0o' + raw);
    else if (sourceId === 'fDec') bigVal = BigInt(raw);
    else bigVal = BigInt('0x' + raw);
  } catch(e) {
    document.getElementById(sourceId).classList.add('error');
    errEl.textContent = 'Number too large or invalid.';
    errEl.classList.remove('hidden');
    updating = false;
    return;
  }

  if (sourceId !== 'fBin') document.getElementById('fBin').value = bigVal.toString(2);
  if (sourceId !== 'fOct') document.getElementById('fOct').value = bigVal.toString(8);
  if (sourceId !== 'fDec') document.getElementById('fDec').value = bigVal.toString(10);
  if (sourceId !== 'fHex') document.getElementById('fHex').value = bigVal.toString(16).toUpperCase();

  // Bit info
  const bits = bigVal.toString(2).length;
  const ranges = [
    { label: '8-bit unsigned',   min: 0n, max: 255n },
    { label: '16-bit unsigned',  min: 0n, max: 65535n },
    { label: '32-bit unsigned',  min: 0n, max: 4294967295n },
    { label: '64-bit unsigned',  min: 0n, max: 18446744073709551615n },
    { label: '8-bit signed',     min: -128n, max: 127n },
    { label: '16-bit signed',    min: -32768n, max: 32767n },
    { label: '32-bit signed',    min: -2147483648n, max: 2147483647n },
    { label: '64-bit signed',    min: -9223372036854775808n, max: 9223372036854775807n },
  ];

  let infoHtml = `<div class="info-item"><div class="info-item-label">Bit Length</div><div class="info-item-val">${bits} bits</div></div>`;
  ranges.forEach(r => {
    const fits = bigVal >= r.min && bigVal <= r.max;
    infoHtml += `<div class="info-item"><div class="info-item-label">${escHtml(r.label)}</div><div class="info-item-val ${fits ? 'fit-yes' : 'fit-no'}">${fits ? '✓ Fits' : '✗ No'}</div></div>`;
  });
  document.getElementById('infoGrid').innerHTML = infoHtml;
  document.getElementById('infoCard').style.display = '';

  updating = false;
}

['fBin','fOct','fDec','fHex'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => convert(id));
  document.getElementById('copy' + id.slice(1, 4).charAt(0).toUpperCase() + id.slice(2, 4))
    ?.addEventListener('click', function() { copyText(document.getElementById(id).value, this); });
});

document.getElementById('copyBin').addEventListener('click', function() { copyText(document.getElementById('fBin').value, this); });
document.getElementById('copyOct').addEventListener('click', function() { copyText(document.getElementById('fOct').value, this); });
document.getElementById('copyDec').addEventListener('click', function() { copyText(document.getElementById('fDec').value, this); });
document.getElementById('copyHex').addEventListener('click', function() { copyText(document.getElementById('fHex').value, this); });

convert('fBin');
</script>
</body>
