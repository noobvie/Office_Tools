const CATS = ['All', ...new Set(CHARS.map(c => c.cat))];
let activeCat = 'All';
let recent = JSON.parse(localStorage.getItem('ot-charmap-recent') || '[]');

function saveRecent(ch) {
  recent = [ch, ...recent.filter(c => c !== ch)].slice(0, 10);
  localStorage.setItem('ot-charmap-recent', JSON.stringify(recent));
  renderRecent();
}

function renderRecent() {
  const strip = document.getElementById('recentStrip');
  if (recent.length === 0) {
    strip.innerHTML = '<span style="font-size:.8rem;color:var(--text-muted)">— none yet —</span>';
    return;
  }
  strip.innerHTML = recent.map(ch => {
    const entry = CHARS.find(c => c.ch === ch);
    return `<div class="char-tile" title="${entry ? entry.name : ch}" onclick="copyCh('${ch.replace(/'/g,"\\'")}', this)">${ch}<div class="copied-tip">✓</div></div>`;
  }).join('');
}

function copyCh(ch, el) {
  navigator.clipboard.writeText(ch).then(() => {
    el.classList.add('copied');
    setTimeout(() => el.classList.remove('copied'), 1000);
    saveRecent(ch);
    const entry = CHARS.find(c => c.ch === ch);
    if (entry) {
      const cp = ch.codePointAt(0).toString(16).toUpperCase().padStart(4, '0');
      document.getElementById('detailBox').textContent = `U+${cp} · ${entry.name} · HTML: &#${ch.codePointAt(0)};`;
    }
  });
}

function buildCatBar() {
  const bar = document.getElementById('catBar');
  bar.innerHTML = CATS.map(cat => `<button class="cat-btn${cat === activeCat ? ' active' : ''}" data-cat="${cat}">${cat}</button>`).join('');
  bar.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCat = btn.dataset.cat;
      bar.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    });
  });
}

function renderGrid(query) {
  const grid = document.getElementById('charGrid');
  const q = (query || '').toLowerCase().trim();
  const filtered = CHARS.filter(c => {
    const catOk = activeCat === 'All' || c.cat === activeCat;
    const searchOk = !q || c.ch.includes(q) || c.name.includes(q) || c.cat.toLowerCase().includes(q);
    return catOk && searchOk;
  });
  grid.innerHTML = filtered.map(c => {
    const cp = c.ch.codePointAt(0).toString(16).toUpperCase().padStart(4,'0');
    const safe = c.ch.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<div class="char-tile" onclick="copyCh('${safe}', this)">
      ${c.ch}
      <div class="tooltip">U+${cp}<br>${c.name}</div>
      <div class="copied-tip">✓</div>
    </div>`;
  }).join('');
}

document.getElementById('charSearch').addEventListener('input', function() {
  renderGrid(this.value);
});

buildCatBar();
renderRecent();
renderGrid();
