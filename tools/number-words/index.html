<script>
const ONES = ['','one','two','three','four','five','six','seven','eight','nine',
  'ten','eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen'];
const TENS = ['','','twenty','thirty','forty','fifty','sixty','seventy','eighty','ninety'];
const ORDINAL_ONES = ['','first','second','third','fourth','fifth','sixth','seventh','eighth','ninth',
  'tenth','eleventh','twelfth','thirteenth','fourteenth','fifteenth','sixteenth','seventeenth','eighteenth','nineteenth'];
const ORDINAL_TENS = ['','','twentieth','thirtieth','fortieth','fiftieth','sixtieth','seventieth','eightieth','ninetieth'];

function belowHundred(n, useAnd, ordinal) {
  if (n < 20) {
    if (ordinal) return ORDINAL_ONES[n] || ONES[n] + (n > 0 ? (n === 1?'st':n===2?'nd':n===3?'rd':'th') : '');
    return ONES[n];
  }
  const t = Math.floor(n / 10);
  const o = n % 10;
  if (o === 0) return ordinal ? ORDINAL_TENS[t] : TENS[t];
  if (ordinal) return TENS[t] + '-' + ORDINAL_ONES[o];
  return TENS[t] + '-' + ONES[o];
}

function belowThousand(n, useAnd, ordinal) {
  if (n < 100) return belowHundred(n, useAnd, ordinal);
  const h = Math.floor(n / 100);
  const rem = n % 100;
  const hundredPart = ONES[h] + ' hundred';
  if (rem === 0) return ordinal ? hundredPart + 'th' : hundredPart;
  const connector = useAnd ? ' and ' : ' ';
  return hundredPart + connector + belowHundred(rem, useAnd, ordinal);
}

const GROUPS = [
  [1000000000000000n, 'quadrillion'],
  [1000000000000n,    'trillion'],
  [1000000000n,       'billion'],
  [1000000n,          'million'],
  [1000n,             'thousand'],
];

function numToWords(n, useAnd, ordinal) {
  if (n === 0n) return ordinal ? 'zeroth' : 'zero';
  let parts = [];
  let remaining = n < 0n ? -n : n;

  for (const [val, name] of GROUPS) {
    if (remaining >= val) {
      const count = remaining / val;
      remaining = remaining % val;
      // ordinal only on final group
      const isLast = remaining === 0n;
      parts.push(belowThousand(Number(count), useAnd, false) + ' ' + name + (isLast && ordinal ? (name.endsWith('n') ? 'th' : name.endsWith('d') ? 'th' : 'th') : ''));
    }
  }
  if (remaining > 0n) {
    const connector = (parts.length && useAnd && remaining < 100n) ? ' and ' : (parts.length ? ' ' : '');
    parts.push(connector + belowThousand(Number(remaining), useAnd, ordinal));
  }

  let result = (n < 0n ? 'negative ' : '') + parts.join(' ');
  return result.trim().replace(/\s+/g, ' ');
}

function convert() {
  const raw = document.getElementById('nwInput').value.trim();
  const errEl = document.getElementById('nwError');
  const outEl = document.getElementById('nwOutput');
  errEl.classList.add('hidden');

  if (!raw) { outEl.textContent = ''; return; }

  const useAnd   = document.getElementById('optAnd').checked;
  const ordinal  = document.getElementById('optOrdinal').checked;
  const currency = document.getElementById('optCurrency').checked;
  const cap      = document.getElementById('optCapitalize').checked;

  const MAX = 999999999999999n;

  if (currency) {
    const match = raw.match(/^-?(\d+)(?:\.(\d{1,2}))?$/);
    if (!match) {
      errEl.textContent = 'Invalid number for currency mode. Use e.g. 12.50';
      errEl.classList.remove('hidden');
      outEl.textContent = '';
      return;
    }
    const dollars = BigInt(match[1]);
    const centStr = (match[2] || '').padEnd(2,'0');
    const cents   = BigInt(centStr);
    if (dollars > MAX) {
      errEl.textContent = 'Number too large (max 999,999,999,999,999).';
      errEl.classList.remove('hidden');
      outEl.textContent = '';
      return;
    }
    let result = numToWords(dollars, useAnd, false) + (dollars === 1n ? ' dollar' : ' dollars');
    if (cents > 0n) result += ' and ' + numToWords(cents, useAnd, false) + (cents === 1n ? ' cent' : ' cents');
    if (cap) result = result.charAt(0).toUpperCase() + result.slice(1);
    outEl.textContent = result;
    return;
  }

  // Integer mode — strip dots/commas for convenience
  const cleaned = raw.replace(/[,\s]/g, '');
  if (!/^-?\d+$/.test(cleaned)) {
    errEl.textContent = 'Please enter a valid integer.';
    errEl.classList.remove('hidden');
    outEl.textContent = '';
    return;
  }

  let big;
  try { big = BigInt(cleaned); } catch(e) {
    errEl.textContent = 'Number is too large to parse.';
    errEl.classList.remove('hidden');
    return;
  }

  const absVal = big < 0n ? -big : big;
  if (absVal > MAX) {
    errEl.textContent = 'Number too large (max 999,999,999,999,999).';
    errEl.classList.remove('hidden');
    outEl.textContent = '';
    return;
  }

  let result = numToWords(big, useAnd, ordinal);
  if (cap) result = result.charAt(0).toUpperCase() + result.slice(1);
  outEl.textContent = result;
}

['nwInput','optCapitalize','optAnd','optOrdinal','optCurrency'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('input', convert);
  el.addEventListener('change', convert);
});

document.getElementById('nwCopy').addEventListener('click', function() {
  copyText(document.getElementById('nwOutput').textContent, this);
});

convert();
</script>
