<body>

<header class="site-header">
  <a href="../../index.html" class="header-logo"><span class="logo-icon">🛠️</span> Office Tools</a>
  <span class="header-tool-name">Time Zone Converter</span>
  <div class="header-actions">
    <button class="theme-toggle" id="themeToggle"></button>
  </div>
</header>

<main class="tool-main">
  <div class="tool-header">
    <h1>🌐 Time Zone Converter</h1>
    <p>Convert times between any two time zones. World clock for 40+ cities.</p>
  </div>

  <div class="card">
    <div class="tz-grid">
      <div>
        <label class="form-label">From</label>
        <input type="text" id="fromTzInput" class="form-input" placeholder="Search city…" autocomplete="off" list="tzDatalist">
        <input type="datetime-local" id="fromTime" class="form-input mt-2">
      </div>
      <div class="tz-arrow">→</div>
      <div>
        <label class="form-label">To</label>
        <input type="text" id="toTzInput" class="form-input" placeholder="Search city…" autocomplete="off" list="tzDatalist">
        <datalist id="tzDatalist"></datalist>
        <div class="tz-result" id="tzResult">—</div>
        <div class="tz-result-date" id="tzResultDate"></div>
      </div>
    </div>
    <div style="font-size:.82rem;color:var(--text-muted);margin-top:.5rem" id="tzOffset"></div>
  </div>

  <div class="card mt-2">
    <div style="font-weight:700;margin-bottom:.75rem">🌍 World Clock</div>
    <div class="world-clock" id="worldClock"></div>
  </div>
</main>

<script src="../../js/config.js"></script>
<script src="../../js/common.js"></script>
<script>
// UTC first, rest sorted alphabetically
const ZONES_RAW = [
  { label: 'Adelaide',         tz: 'Australia/Adelaide' },
  { label: 'Amsterdam',        tz: 'Europe/Amsterdam' },
  { label: 'Auckland',         tz: 'Pacific/Auckland' },
  { label: 'Bangkok',          tz: 'Asia/Bangkok' },
  { label: 'Berlin',           tz: 'Europe/Berlin' },
  { label: 'Buenos Aires',     tz: 'America/Argentina/Buenos_Aires' },
  { label: 'Cairo',            tz: 'Africa/Cairo' },
  { label: 'Chicago',          tz: 'America/Chicago' },
  { label: 'Denver',           tz: 'America/Denver' },
  { label: 'Dhaka',            tz: 'Asia/Dhaka' },
  { label: 'Dubai',            tz: 'Asia/Dubai' },
  { label: 'Saigon',           tz: 'Asia/Ho_Chi_Minh' },
  { label: 'Hong Kong',        tz: 'Asia/Hong_Kong' },
  { label: 'Honolulu',         tz: 'Pacific/Honolulu' },
  { label: 'Johannesburg',     tz: 'Africa/Johannesburg' },
  { label: 'Karachi',          tz: 'Asia/Karachi' },
  { label: 'Kuala Lumpur',     tz: 'Asia/Kuala_Lumpur' },
  { label: 'Kyiv',             tz: 'Europe/Kiev' },
  { label: 'Lagos',            tz: 'Africa/Lagos' },
  { label: 'London',           tz: 'Europe/London' },
  { label: 'Los Angeles',      tz: 'America/Los_Angeles' },
  { label: 'Madrid',           tz: 'Europe/Madrid' },
  { label: 'Moscow',           tz: 'Europe/Moscow' },
  { label: 'Mumbai',           tz: 'Asia/Kolkata' },
  { label: 'New York',         tz: 'America/New_York' },
  { label: 'Paris',            tz: 'Europe/Paris' },
  { label: 'Perth',            tz: 'Australia/Perth' },
  { label: 'Rome',             tz: 'Europe/Rome' },
  { label: 'São Paulo',        tz: 'America/Sao_Paulo' },
  { label: 'Seoul',            tz: 'Asia/Seoul' },
  { label: 'Shanghai',         tz: 'Asia/Shanghai' },
  { label: 'Singapore',        tz: 'Asia/Singapore' },
  { label: 'Sydney',           tz: 'Australia/Sydney' },
  { label: 'Taipei',           tz: 'Asia/Taipei' },
  { label: 'Tokyo',            tz: 'Asia/Tokyo' },
  { label: 'Toronto',          tz: 'America/Toronto' },
  { label: 'Vancouver',        tz: 'America/Vancouver' },
  { label: 'Warsaw',           tz: 'Europe/Warsaw' },
];
const ZONES = [{ label: 'UTC', tz: 'UTC' }, ...ZONES_RAW];

const WORLD_CITIES = ['Europe/London','America/New_York','America/Los_Angeles','America/Sao_Paulo','Asia/Dubai','Europe/Paris','Asia/Ho_Chi_Minh','Asia/Kolkata','Asia/Singapore','Asia/Tokyo'];
// Note: Saigon = Asia/Ho_Chi_Minh label set in ZONES_RAW above

// Populate datalist
const dl = document.getElementById('tzDatalist');
ZONES.forEach(z => {
  const opt = document.createElement('option');
  opt.value = z.label;
  dl.appendChild(opt);
});

const fromTzInput = document.getElementById('fromTzInput');
const toTzInput   = document.getElementById('toTzInput');
const fromTimeEl  = document.getElementById('fromTime');

function getTzCode(label) {
  const z = ZONES.find(z => z.label.toLowerCase() === label.trim().toLowerCase());
  return z ? z.tz : null;
}

// Defaults
fromTzInput.value = 'UTC';
toTzInput.value   = 'New York';

// Set default datetime to now
function localIso() {
  const n = new Date();
  return new Date(n.getTime() - n.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
}
fromTimeEl.value = localIso();

function convert() {
  const fromTz = getTzCode(fromTzInput.value) || 'UTC';
  const toTz   = getTzCode(toTzInput.value)   || 'UTC';
  const rawVal = fromTimeEl.value;
  if (!rawVal) return;

  // Parse datetime-local as UTC assuming the "from" tz
  const [datePart, timePart] = rawVal.split('T');
  const [y,mo,d] = datePart.split('-').map(Number);
  const [h,mi]   = timePart.split(':').map(Number);

  // Create a date in the from timezone — use a trick: format epoch 0 in the target tz to get offset
  const testDate = new Date(Date.UTC(y, mo-1, d, h, mi));

  // Get offset of fromTz at this moment
  function getOffset(tz, date) {
    const utcStr  = new Intl.DateTimeFormat('en', { timeZone:'UTC', hour12:false, year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }).format(date);
    const tzStr   = new Intl.DateTimeFormat('en', { timeZone: tz,  hour12:false, year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }).format(date);
    return parseFmt(utcStr) - parseFmt(tzStr);
  }
  function parseFmt(s) {
    const m = s.match(/(\d+)\/(\d+)\/(\d+),\s*(\d+):(\d+)/);
    if (!m) return 0;
    return Date.UTC(+m[3],+m[1]-1,+m[2],+m[4],+m[5]);
  }

  const offsetMs = getOffset(fromTz, testDate);
  const utcMs = testDate.getTime() + offsetMs;
  const utcDate = new Date(utcMs);

  const timeFmt = new Intl.DateTimeFormat('en-GB', { timeZone: toTz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: false });
  const dateFmt = new Intl.DateTimeFormat('en-GB', { timeZone: toTz, weekday:'short', year:'numeric', month:'short', day:'numeric' });

  document.getElementById('tzResult').textContent = timeFmt.format(utcDate);
  document.getElementById('tzResultDate').textContent = dateFmt.format(utcDate);

  // Show offset difference
  const fromOff = -getOffset(fromTz, utcDate) / 60000;
  const toOff   = -getOffset(toTz,   utcDate) / 60000;
  const diff    = (toOff - fromOff) / 60;
  const sign    = diff >= 0 ? '+' : '';
  document.getElementById('tzOffset').textContent = `Difference: ${sign}${diff}h`;
}

fromTzInput.addEventListener('change', convert);
fromTzInput.addEventListener('input', () => { if (getTzCode(fromTzInput.value)) convert(); });
toTzInput.addEventListener('change', convert);
toTzInput.addEventListener('input', () => { if (getTzCode(toTzInput.value)) convert(); });
fromTimeEl.addEventListener('input', convert);
convert();

// World clock
function buildWorldClock() {
  const container = document.getElementById('worldClock');
  container.innerHTML = '';
  const now = new Date();
  WORLD_CITIES.forEach(tz => {
    const label = ZONES.find(z => z.tz === tz)?.label || tz;
    const timeStr = new Intl.DateTimeFormat('en-GB', { timeZone: tz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false }).format(now);
    const dateStr = new Intl.DateTimeFormat('en-GB', { timeZone: tz, weekday:'short', month:'short', day:'numeric' }).format(now);
    const div = document.createElement('div');
    div.className = 'wc-city';
    div.innerHTML = `<div class="wc-name">${escHtml(label)}</div><div class="wc-time">${timeStr}</div><div class="wc-date">${dateStr}</div>`;
    container.appendChild(div);
  });
}

buildWorldClock();
setInterval(buildWorldClock, 1000);
</script>
</body>
</html>
