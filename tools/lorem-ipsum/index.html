<script>
const SENTENCES = [
  'Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.',
  'Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.',
  'Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur.',
  'Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.',
  'Sed ut perspiciatis unde omnis iste natus error sit voluptatem accusantium doloremque laudantium.',
  'Nemo enim ipsam voluptatem quia voluptas sit aspernatur aut odit aut fugit, sed quia consequuntur magni dolores.',
  'Neque porro quisquam est, qui dolorem ipsum quia dolor sit amet, consectetur, adipisci velit.',
  'Ut labore et dolore magnam aliquam quaerat voluptatem et harum quidem rerum facilis est et expedita distinctio.',
  'Nam libero tempore, cum soluta nobis est eligendi optio cumque nihil impedit quo minus id quod maxime placeat facere possimus.',
  'Temporibus autem quibusdam et aut officiis debitis aut rerum necessitatibus saepe eveniet ut et voluptates repudiandae sint.',
];

const WORDS = SENTENCES.join(' ').replace(/[,\.]/g, '').split(' ').filter(w => w.length > 0);
const CLASSIC = 'Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.';

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getSentences(n, classic) {
  const pool = classic ? [CLASSIC, ...shuffle(SENTENCES.slice(1))] : shuffle(SENTENCES);
  const out = [];
  for (let i = 0; i < n; i++) out.push(pool[i % pool.length]);
  return out;
}

function getParagraph(classic, isFirst) {
  const count = 4 + Math.floor(Math.random() * 4);
  const sents = isFirst && classic
    ? [CLASSIC, ...getSentences(count - 1, false)]
    : getSentences(count, false);
  return sents.join(' ');
}

function generate() {
  const type  = document.getElementById('liType').value;
  const count = Math.max(1, Math.min(100, parseInt(document.getElementById('liCount').value) || 3));
  const classic = document.getElementById('liClassic').checked;
  let output = '';

  if (type === 'paragraphs') {
    const paras = [];
    for (let i = 0; i < count; i++) paras.push(getParagraph(classic, i === 0));
    output = paras.join('\n\n');
  } else if (type === 'sentences') {
    output = getSentences(count, classic).join(' ');
  } else if (type === 'words') {
    const pool = classic ? ['Lorem', 'ipsum', ...shuffle(WORDS)] : shuffle(WORDS);
    const w = [];
    for (let i = 0; i < count; i++) w.push(pool[i % pool.length]);
    output = w.join(' ') + '.';
  } else {
    // list
    const sents = getSentences(count, classic);
    output = sents.map(s => '• ' + s).join('\n');
  }

  document.getElementById('liOutput').value = output;
  const wc = output.trim().split(/\s+/).filter(w => w.length).length;
  document.getElementById('liWordCount').textContent = `${wc} words`;
}

document.getElementById('liGenerate').addEventListener('click', generate);
document.getElementById('liCopy').addEventListener('click', function() {
  copyText(document.getElementById('liOutput').value, this);
});

generate();
</script>
